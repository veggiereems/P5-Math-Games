<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage of a Whole</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--accent:#e11d48;--accent-lt:#fb7185;--accent-bg:#fff1f2;--bg:#fff1f2;--soft:#6b7280;--text:#4c0519;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 32px;color:var(--text);}
  header{text-align:center;margin-bottom:12px;}
  header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,2rem);color:var(--accent);}
  header p{font-size:.78rem;color:var(--soft);font-weight:700;margin-top:2px;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .level-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:6px 16px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;transition:all .16s;background:#fff;-webkit-tap-highlight-color:transparent;}
  .level-btn.easy{color:#16a34a;border-color:#4ade80;}.level-btn.medium{color:var(--accent);border-color:var(--accent-lt);}.level-btn.hard{color:#7c3aed;border-color:#a78bfa;}
  .level-btn.easy.active{background:#4ade80;color:#fff;}.level-btn.medium.active{background:var(--accent-lt);color:#fff;}.level-btn.hard.active{background:#a78bfa;color:#fff;}
  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
  .stat-box{background:#fff;border-radius:14px;padding:7px 16px;text-align:center;min-width:78px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .stat-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.6rem;line-height:1.1;}
  .pts-box .stat-val{color:var(--accent);}.streak-box .stat-val{color:#f97316;}.pb-box .stat-val{color:#8b5cf6;}
  .prog-wrap{width:100%;max-width:500px;margin-bottom:12px;}
  .prog-track{background:#e5e7eb;border-radius:99px;height:11px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-lt),var(--accent));transition:width .4s;width:0%;}
  .prog-info{display:flex;justify-content:space-between;margin-top:3px;font-size:.7rem;font-weight:800;color:var(--soft);}
  .milestone{color:var(--accent);}
  .game-card{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(225,29,72,.1);border-top:5px solid var(--accent-lt);display:flex;flex-direction:column;align-items:center;gap:18px;}
  .badge{font-size:.72rem;font-weight:800;background:var(--accent-bg);color:var(--accent);padding:4px 14px;border-radius:50px;}
  .hint-box{background:var(--accent-bg);border-radius:12px;padding:8px 14px;font-size:.78rem;font-weight:700;color:var(--accent);text-align:center;width:100%;}
  .context-card{background:#fff7ed;border-radius:14px;padding:14px 16px;font-size:.95rem;font-weight:700;color:#431407;text-align:center;width:100%;border:2px solid #fde68a;line-height:1.6;}
  .eq-row{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;}
  .eq-num{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2.2rem);color:var(--text);}
  .eq-of{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--soft);}
  .ans-input{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2.2rem);width:120px;text-align:center;border:3px solid #d1d5db;border-radius:14px;padding:8px;outline:none;background:#f9fafb;color:var(--text);-moz-appearance:textfield;}
  .ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .ans-input:focus{border-color:var(--accent-lt);background:var(--accent-bg);}
  .ans-input.ok{border-color:#16a34a;background:#dcfce7;color:#16a34a;}
  .ans-input.wrong{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .check-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #9f1239;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .check-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #9f1239;}
  .check-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #9f1239;}
  .check-btn:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}
  .feedback{width:100%;border-radius:14px;padding:11px 14px;font-size:.88rem;font-weight:800;text-align:center;display:none;}
  .feedback.ok{background:#dcfce7;color:#16a34a;display:block;}
  .feedback.wrong{background:#fef3c7;color:#92400e;display:block;}
  .next-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:10px 30px;background:#60a5fa;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #2563eb;display:none;-webkit-tap-highlight-color:transparent;}
  .next-btn.show{display:block;}
  .reset-btn{margin-top:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:var(--soft);background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;cursor:pointer;}
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header><h1>🔍 Percentage of a Whole</h1><p>Primary 5 · Find the percentage amount</p></header>
<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium" onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard" onclick="setLevel('hard')">💎 Hard</button>
</div>
<div class="stats-row">
  <div class="stat-box pts-box"><div class="stat-lbl">Points</div><div class="stat-val" id="pts-val">0</div></div>
  <div class="stat-box streak-box"><div class="stat-lbl">Streak</div><div class="stat-val" id="streak-val">0</div></div>
  <div class="stat-box pb-box"><div class="stat-lbl">Best</div><div class="stat-val" id="pb-val">0</div></div>
</div>
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-info"><span id="q-count">0 / 10</span><span class="milestone" id="milestone">🎯 First goal: 30 pts</span></div>
</div>
<div class="game-card" id="game-card">
  <span class="badge" id="badge"></span>
  <div class="hint-box" id="hint-box"></div>
  <div class="context-card" id="context-card"></div>
  <div class="eq-row" id="eq-row"></div>
  <button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset</button>
<script>
const TOTAL=10;
let pts=0,streak=0,pb=0,qCount=0,answered=false,level='easy';
let correctAnswer=0;
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

const CFG={
  easy:{badge:'⭐ 10%, 25%, 50%, 75% of round numbers',hint:'10% → divide by 10. 50% → divide by 2. 25% → divide by 4.'},
  medium:{badge:'🔥 Any common percentage of a whole',hint:'Find 1% first, then multiply. Or find 10% and adjust.'},
  hard:{badge:'💎 Word problems · multi-step',hint:'Read carefully — what is the whole? What percentage do you need?'}
};

const EASY_Q=[
  {pct:10,whole:80},{pct:50,whole:60},{pct:25,whole:120},{pct:75,whole:80},{pct:10,whole:150},
  {pct:50,whole:200},{pct:25,whole:200},{pct:10,whole:360},{pct:50,whole:900},{pct:75,whole:400},
  {pct:20,whole:50},{pct:20,whole:200},{pct:40,whole:50},{pct:60,whole:100},{pct:80,whole:50}
];
const MED_Q=[
  {pct:15,whole:80},{pct:35,whole:200},{pct:45,whole:60},{pct:30,whole:240},{pct:15,whole:120},
  {pct:55,whole:200},{pct:65,whole:80},{pct:45,whole:200},{pct:35,whole:60},{pct:80,whole:150},
  {pct:70,whole:90},{pct:85,whole:200},{pct:15,whole:200},{pct:95,whole:80},{pct:60,whole:150}
];
const HARD_CONTEXTS=[
  {tmpl:'A school has {w} pupils. {p}% are boys. How many boys are there?'},
  {tmpl:'A bag costs ${w}. It is on sale at {p}% of its original price. What is the sale price?'},
  {tmpl:'There are {w} questions in a test. Priya got {p}% correct. How many did she get right?'},
  {tmpl:'A tank holds {w} litres of water. {p}% of the water has been used. How many litres remain?'},
  {tmpl:'A farmer has {w} chickens. {p}% of them laid eggs today. How many laid eggs?'},
];
const HARD_Q=[{p:15,w:200},{p:35,w:400},{p:45,w:120},{p:65,w:200},{p:85,w:120},{p:24,w:250},{p:36,w:300},{p:72,w:150},{p:48,w:125},{p:56,w:250}];

function setLevel(l){level=l;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.level-btn.'+l).classList.add('active');resetGame();}

function genQ(){
  if(level==='easy'){
    const q=EASY_Q[rand(0,EASY_Q.length-1)];
    const ans=q.pct/100*q.whole;
    return{pct:q.pct,whole:q.whole,ans,context:'Find '+q.pct+'% of '+q.whole};
  }
  if(level==='medium'){
    const q=MED_Q[rand(0,MED_Q.length-1)];
    const ans=q.pct/100*q.whole;
    return{pct:q.pct,whole:q.whole,ans,context:'Find '+q.pct+'% of '+q.whole};
  }
  const q=HARD_Q[rand(0,HARD_Q.length-1)];
  const ctx=HARD_CONTEXTS[rand(0,HARD_CONTEXTS.length-1)];
  const ans=q.p/100*q.w;
  const context=ctx.tmpl.replace('{p}',q.p).replace('{w}',q.w);
  return{pct:q.p,whole:q.w,ans,context};
}

function generateQ(){
  answered=false;
  const q=genQ();
  correctAnswer=Math.round(q.ans*100)/100;
  document.getElementById('badge').textContent=CFG[level].badge;
  document.getElementById('hint-box').textContent=CFG[level].hint;
  document.getElementById('context-card').textContent=q.context;
  const eq=document.getElementById('eq-row');
  eq.innerHTML='<span class="eq-num">'+q.pct+'%</span>'+
    '<span class="eq-of">of</span>'+
    '<span class="eq-num">'+q.whole+'</span>'+
    '<span class="eq-of">=</span>'+
    '<input class="ans-input" id="ans-input" type="number" placeholder="?" autocomplete="off" inputmode="numeric"/>';
  document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});
  document.getElementById('check-btn').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  setTimeout(()=>{const i=document.getElementById('ans-input');if(i)i.focus();},80);
}

function submitAnswer(){
  if(answered)return;
  const inp=document.getElementById('ans-input');
  if(!inp)return;
  const raw=inp.value.trim();
  if(raw===''){inp.style.borderColor='#fbbf24';setTimeout(()=>{inp.style.borderColor='';},600);return;}
  const val=parseFloat(raw);
  if(isNaN(val))return;
  answered=true;inp.disabled=true;document.getElementById('check-btn').disabled=true;
  const correct=Math.abs(val-correctAnswer)<0.01;
  if(correct){
    inp.classList.add('ok');streak++;
    let bonus=0,bonusMsg='';
    if(streak>=5){bonus=10;bonusMsg=' · ⚡ Hot streak! +10';}
    else if(streak>=3){bonus=5;bonusMsg=' · 🔥 +5 streak bonus!';}
    if(Math.random()<0.1){bonus+=5;bonusMsg+=' · 🍀 Lucky +5!';}
    pts+=10+bonus;if(pts>pb)pb=pts;qCount++;updateUI();
    const fb=document.getElementById('feedback');fb.className='feedback ok';fb.textContent='✓ Correct! +10 pts'+bonusMsg;
    launchConfetti();
  } else {
    inp.classList.add('wrong');streak=0;qCount++;updateUI();
    const fb=document.getElementById('feedback');fb.className='feedback wrong';
    fb.textContent='Not quite — the answer is '+correctAnswer;
  }
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,700);
}

function nextQ(){generateQ();}
function updateUI(){
  document.getElementById('pts-val').textContent=pts;document.getElementById('streak-val').textContent=streak;document.getElementById('pb-val').textContent=pb;
  document.getElementById('q-count').textContent=qCount+' / '+TOTAL;document.getElementById('prog-fill').style.width=(qCount/TOTAL*100)+'%';
  const m=document.getElementById('milestone');
  if(pts>=90)m.textContent='🏆 Brilliant!';else if(pts>=60)m.textContent='🌟 Next goal: 90 pts';else if(pts>=30)m.textContent='✅ Next goal: 60 pts';else m.textContent='🎯 First goal: 30 pts';
}
function showEndScreen(){
  const em=pts>=90?'🏆':pts>=60?'🌟':'💪';
  const msg=pts>=90?'Percentage expert!':pts>=60?'Great work!':'Keep practising!';
  document.getElementById('game-card').innerHTML='<div style="text-align:center;padding:16px 0;"><div style="font-size:3rem;">'+em+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.3rem;margin-top:8px;">'+msg+'</div><div style="font-size:.9rem;color:var(--soft);margin-top:6px;font-weight:700;">Score: '+pts+' pts · Best: '+pb+' pts</div><button onclick="resetGame()" style="margin-top:16px;font-family:\'Nunito\',sans-serif;font-weight:800;font-size:.9rem;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;">Play Again!</button></div>';
  if(pts>=90)launchConfetti(180);
}
function resetGame(){
  pts=0;streak=0;qCount=0;
  document.getElementById('game-card').innerHTML='<span class="badge" id="badge"></span><div class="hint-box" id="hint-box"></div><div class="context-card" id="context-card"></div><div class="eq-row" id="eq-row"></div><button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>';
  updateUI();generateQ();
}
generateQ();
function launchConfetti(n){n=n||55;const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=['#fb7185','#34d399','#fbbf24','#f472b6','#60a5fa'];const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],ta:0,tai:Math.random()*.07+.04,vx:Math.random()*2-1,vy:Math.random()*3+2}));let ttl=110;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.tai;p.y+=p.vy;p.x+=p.vx;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);ctx.stroke();});if(--ttl>0)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();}
</script>
</body>
</html>
