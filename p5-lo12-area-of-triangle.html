<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area of Triangle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--accent:#dc2626;--accent-lt:#fca5a5;--accent-bg:#fff5f5;--bg:#fff5f5;--soft:#6b7280;--text:#450a0a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 32px;color:var(--text);}
  header{text-align:center;margin-bottom:12px;}
  header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,2rem);color:var(--accent);}
  header p{font-size:.78rem;color:var(--soft);font-weight:700;margin-top:2px;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .level-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:6px 16px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;background:#fff;-webkit-tap-highlight-color:transparent;}
  .level-btn.easy{color:#16a34a;border-color:#4ade80;}.level-btn.medium{color:var(--accent);border-color:var(--accent-lt);}.level-btn.hard{color:#7c3aed;border-color:#c4b5fd;}
  .level-btn.easy.active{background:#4ade80;color:#fff;}.level-btn.medium.active{background:var(--accent-lt);color:#fff;}.level-btn.hard.active{background:#c4b5fd;color:#fff;}
  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
  .stat-box{background:#fff;border-radius:14px;padding:7px 16px;text-align:center;min-width:78px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .stat-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.6rem;line-height:1.1;}
  .pts-box .stat-val{color:var(--accent);}.streak-box .stat-val{color:#f97316;}.pb-box .stat-val{color:#8b5cf6;}
  .prog-wrap{width:100%;max-width:500px;margin-bottom:12px;}
  .prog-track{background:#e5e7eb;border-radius:99px;height:11px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-lt),var(--accent));transition:width .4s;width:0%;}
  .prog-info{display:flex;justify-content:space-between;margin-top:3px;font-size:.7rem;font-weight:800;color:var(--soft);}
  .milestone{color:var(--accent);}
  .game-card{background:#fff;border-radius:20px;padding:22px 18px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(220,38,38,.1);border-top:5px solid var(--accent-lt);display:flex;flex-direction:column;align-items:center;gap:16px;}
  .badge{font-size:.72rem;font-weight:800;background:var(--accent-bg);color:var(--accent);padding:4px 14px;border-radius:50px;}
  .hint-box{background:var(--accent-bg);border-radius:12px;padding:8px 14px;font-size:.78rem;font-weight:700;color:var(--accent);text-align:center;width:100%;}
  .svg-wrap{width:100%;max-width:260px;margin:0 auto;}
  svg{width:100%;height:auto;}
  .question-text{font-size:.95rem;font-weight:800;text-align:center;color:var(--text);}
  .eq-row{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;}
  .eq-label{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--soft);}
  .ans-input{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2rem);width:120px;text-align:center;border:3px solid #d1d5db;border-radius:14px;padding:8px;outline:none;background:#f9fafb;color:var(--text);-moz-appearance:textfield;}
  .ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .ans-input:focus{border-color:var(--accent-lt);background:var(--accent-bg);}
  .ans-input.ok{border-color:#16a34a;background:#dcfce7;color:#16a34a;}
  .ans-input.wrong{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .check-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #991b1b;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .check-btn:hover{transform:translateY(-2px);}.check-btn:active{transform:translateY(2px);}
  .check-btn:disabled{opacity:.4;cursor:default;transform:none;}
  .feedback{width:100%;border-radius:14px;padding:11px 14px;font-size:.88rem;font-weight:800;text-align:center;display:none;}
  .feedback.ok{background:#dcfce7;color:#16a34a;display:block;}
  .feedback.wrong{background:#fef3c7;color:#92400e;display:block;}
  .next-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:10px 30px;background:#60a5fa;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #2563eb;display:none;-webkit-tap-highlight-color:transparent;}
  .next-btn.show{display:block;}
  .reset-btn{margin-top:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:var(--soft);background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;cursor:pointer;}
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header><h1>📐 Area of Triangle</h1><p>Primary 5 · ½ × base × height</p></header>
<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium" onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard" onclick="setLevel('hard')">💎 Hard</button>
</div>
<div class="stats-row">
  <div class="stat-box pts-box"><div class="stat-lbl">Points</div><div class="stat-val" id="pts-val">0</div></div>
  <div class="stat-box streak-box"><div class="stat-lbl">Streak</div><div class="stat-val" id="streak-val">0</div></div>
  <div class="stat-box pb-box"><div class="stat-lbl">Best</div><div class="stat-val" id="pb-val">0</div></div>
</div>
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-info"><span id="q-count">0 / 10</span><span class="milestone" id="milestone">🎯 First goal: 30 pts</span></div>
</div>
<div class="game-card" id="game-card">
  <span class="badge" id="badge"></span>
  <div class="hint-box" id="hint-box"></div>
  <div class="svg-wrap" id="svg-wrap"></div>
  <div class="question-text" id="question-text"></div>
  <div class="eq-row" id="eq-row"></div>
  <button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset</button>
<script>
const TOTAL=10;
let pts=0,streak=0,pb=0,qCount=0,answered=false,level='easy';
let correctAnswer=0;
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

const CFG={
  easy:{badge:'⭐ Right-angled triangles',hint:'Area = ½ × base × height. The height is the vertical side.'},
  medium:{badge:'🔥 All side lengths labelled — find the area',hint:'Area = ½ × base × height.'},
  hard:{badge:'💎 Obtuse triangle',hint:'The formula still works: Area = ½ × base × height. The dashed height line may fall outside the triangle.'}
};

function setLevel(l){level=l;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.level-btn.'+l).classList.add('active');generateQ();}

// Draw right triangle (easy)
function drawRight(base,height){
  const W=260,H=210;
  const sc=Math.min(150/base,150/height,12);
  const x0=36,y0=H-28;
  const bscaled=base*sc,hscaled=height*sc;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  const pts=`${x0},${y0} ${x0},${y0-hscaled} ${x0+bscaled},${y0}`;
  svg+=`<polygon points="${pts}" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>`;
  svg+=`<polyline points="${x0+10},${y0} ${x0+10},${y0-10} ${x0},${y0-10}" fill="none" stroke="#dc2626" stroke-width="1.8"/>`;
  // height label — left of vertical side, clear of shape
  svg+=`<text x="${x0-18}" y="${(y0-hscaled/2+5).toFixed(1)}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="14" fill="#dc2626">${height} cm</text>`;
  // base label — below horizontal side
  svg+=`<text x="${(x0+bscaled/2).toFixed(1)}" y="${y0+18}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="14" fill="#dc2626">${base} cm</text>`;
  svg+=`</svg>`;
  return svg;
}

// Draw a general triangle given three vertices, with a specific base edge and perpendicular height shown
// baseIdx: which edge is the base (0=bottom, 1=right, 2=left)
// All three sides are labelled with their lengths
function drawLabelledTriangle(pts3, base, height, heightFootRatio, sideLabels, isObtuse){
  const W=270,H=210;
  // Scale pts to fit
  const allX=pts3.map(p=>p[0]),allY=pts3.map(p=>p[1]);
  const minX=Math.min(...allX),maxX=Math.max(...allX),minY=Math.min(...allY),maxY=Math.max(...allY);
  const scX=(W-60)/(maxX-minX||1),scY=(H-50)/(maxY-minY||1);
  const sc=Math.min(scX,scY,14);
  const offX=30-minX*sc+(W-60-(maxX-minX)*sc)/2;
  const offY=20-minY*sc+(H-50-(maxY-minY)*sc)/2;
  const sp=pts3.map(p=>[p[0]*sc+offX,p[1]*sc+offY]);
  const svgPts=sp.map(p=>p.join(',')).join(' ');
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<polygon points="${svgPts}" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>`;

  // Height line: foot is on the base edge; apex is the opposite vertex
  // Base edge is pts3[0]->pts3[1]; apex is pts3[2]
  const bx1=sp[0][0],by1=sp[0][1],bx2=sp[1][0],by2=sp[1][1];
  const ax=sp[2][0],ay=sp[2][1];
  // Foot of perpendicular from apex to base line
  const bdx=bx2-bx1,bdy=by2-by1;
  const t2=((ax-bx1)*bdx+(ay-by1)*bdy)/(bdx*bdx+bdy*bdy);
  const footX=bx1+t2*bdx,footY=by1+t2*bdy;
  // Dashed height line
  svg+=`<line x1="${footX.toFixed(1)}" y1="${footY.toFixed(1)}" x2="${ax.toFixed(1)}" y2="${ay.toFixed(1)}" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  // Right-angle marker at foot
  const blen=Math.sqrt(bdx*bdx+bdy*bdy);
  const ubx=bdx/blen,uby=bdy/blen;
  const upx=-(ay-footY)/(Math.sqrt((ax-footX)**2+(ay-footY)**2)||1);
  const upy=-(ax-footX)/(Math.sqrt((ax-footX)**2+(ay-footY)**2)||1)*(-1);
  const mSize=7;
  const m1x=footX+ubx*mSize,m1y=footY+uby*mSize;
  const m2x=m1x+upx*mSize,m2y=m1y+upy*mSize; // wrong — use perpendicular to base
  // Proper right-angle marker: two lines perpendicular to each other at foot
  const nx=-uby,ny=ubx; // perpendicular to base direction (toward apex)
  const signN=((ax-footX)*nx+(ay-footY)*ny)>0?1:-1;
  const c1x=footX+ubx*mSize,c1y=footY+uby*mSize;
  const c2x=footX+signN*nx*mSize,c2y=footY+signN*ny*mSize;
  const c3x=c1x+signN*nx*mSize,c3y=c1y+signN*ny*mSize;
  svg+=`<polyline points="${c1x.toFixed(1)},${c1y.toFixed(1)} ${c3x.toFixed(1)},${c3y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)}" fill="none" stroke="#7c3aed" stroke-width="1.5"/>`;

  // Height label — midpoint of height line, offset to the side
  const hmx=(footX+ax)/2,hmy=(footY+ay)/2;
  svg+=`<text x="${(hmx+10).toFixed(1)}" y="${(hmy+4).toFixed(1)}" text-anchor="start" font-family="Fredoka One,cursive" font-size="13" fill="#7c3aed">${height} cm</text>`;

  // Side labels for all three edges
  // Edge 0: sp[0]->sp[1] (base)
  // Edge 1: sp[1]->sp[2]
  // Edge 2: sp[2]->sp[0]
  const edges=[[0,1],[1,2],[2,0]];
  const centX=(sp[0][0]+sp[1][0]+sp[2][0])/3;
  const centY=(sp[0][1]+sp[1][1]+sp[2][1])/3;
  edges.forEach(([a,b],i)=>{
    if(!sideLabels[i])return;
    const mx=(sp[a][0]+sp[b][0])/2,my=(sp[a][1]+sp[b][1])/2;
    // push label away from centroid
    const dx=mx-centX,dy=my-centY;
    const dl=Math.sqrt(dx*dx+dy*dy)||1;
    const lx=mx+dx/dl*14,ly=my+dy/dl*14;
    svg+=`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="13" fill="#dc2626">${sideLabels[i]} cm</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

// Compute side lengths of a triangle from 3 points
function sideLengths(pts){
  const d=(a,b)=>Math.round(Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2)*10)/10;
  return[d(pts[0],pts[1]),d(pts[1],pts[2]),d(pts[2],pts[0])];
}
// For SVG (y increases down): base along bottom [0],[1], apex above [2]
function makeTriPtsDown(b,h,apexRatio){
  return[[0,h],[b,h],[b*apexRatio,0]];
}

// Rotate a set of points around their centroid by angleDeg degrees
function rotatePts(pts, angleDeg){
  const a=angleDeg*Math.PI/180;
  const cx=(pts[0][0]+pts[1][0]+pts[2][0])/3;
  const cy=(pts[0][1]+pts[1][1]+pts[2][1])/3;
  return pts.map(([x,y])=>{
    const dx=x-cx,dy=y-cy;
    return[cx+dx*Math.cos(a)-dy*Math.sin(a), cy+dx*Math.sin(a)+dy*Math.cos(a)];
  });
}

// Draw obtuse triangle: base horizontal, apex to the LEFT of the base
// ext = the extension distance from the left base vertex to the foot of the height
function drawObtuse(b, h, ext){
  const W=320,H=230;
  const sc=Math.min(220/(ext+b+20), 160/h, 14);
  const padL=50, padT=24;
  const footX=padL, baseY=padT+h*sc;
  const apexX=padL, apexY=padT;
  const baseX1=padL+ext*sc, baseX2=padL+(ext+b)*sc;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Triangle fill
  const triPts=`${apexX},${apexY} ${baseX1},${baseY} ${baseX2},${baseY}`;
  svg+=`<polygon points="${triPts}" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>`;

  // Extension line from foot to base-left vertex (dotted)
  svg+=`<line x1="${footX}" y1="${baseY}" x2="${baseX1}" y2="${baseY}" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>`;

  // Dashed height line (vertical from foot up to apex)
  svg+=`<line x1="${footX}" y1="${baseY}" x2="${apexX}" y2="${apexY}" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>`;

  // Right-angle marker at foot
  const m=7;
  svg+=`<polyline points="${footX+m},${baseY} ${footX+m},${baseY-m} ${footX},${baseY-m}" fill="none" stroke="#7c3aed" stroke-width="1.5"/>`;

  // Extension right-angle end markers (small ticks to show it ends at foot)
  // Small vertical tick at foot on the extended base line
  svg+=`<line x1="${footX}" y1="${baseY-5}" x2="${footX}" y2="${baseY+5}" stroke="#374151" stroke-width="1.5"/>`;

  // Labels
  // Base label — below base line
  const baseMidX=(baseX1+baseX2)/2;
  svg+=`<text x="${baseMidX.toFixed(1)}" y="${baseY+18}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="13" fill="#dc2626">${b} cm</text>`;
  // Height label — left of height line
  const hMidY=(apexY+baseY)/2;
  svg+=`<text x="${footX-10}" y="${(hMidY+4).toFixed(1)}" text-anchor="end" font-family="Fredoka One,cursive" font-size="13" fill="#7c3aed">${h} cm</text>`;
  // Extension label — below extension line
  const extMidX=(footX+baseX1)/2;
  svg+=`<text x="${extMidX.toFixed(1)}" y="${baseY+18}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="13" fill="#374151">${ext} cm</text>`;

  svg+=`</svg>`;
  return svg;
}

function genEasy(){
  let b,h;
  do{b=rand(3,14);h=rand(3,14);}while((b*h)%2!==0);
  return{svg:drawRight(b,h),qText:'Find the area of this triangle.',ans:b*h/2,unit:'cm²'};
}

function genMedium(){
  let b,h;
  do{b=rand(4,14);h=rand(3,12);}while((b*h)%2!==0);
  // Vary apex position across three variants so base/height orientation differs visually
  const variant=rand(0,2);
  const apexRatios=[0.3, 0.5, 0.75][variant]; // left-leaning, centred, right-leaning
  const pts3=makeTriPtsDown(b,h,apexRatios);
  const sides=sideLengths(pts3);
  const sideLabels=[b,Math.round(sides[1]*10)/10,Math.round(sides[2]*10)/10];
  const svg=drawLabelledTriangle(pts3,b,h,apexRatios,sideLabels,false);
  return{svg,qText:'Find the area of this triangle.',ans:b*h/2,unit:'cm²'};
}

function genHard(){
  // Obtuse triangle: ext × multiples give clean numbers
  // ext is the length of the extension line
  let b,h,ext;
  // Ensure b*h is even for whole number area; ext is a small integer
  do{
    ext=rand(2,5);
    b=rand(4,12)*2;
    h=rand(3,10);
  }while((b*h)%2!==0);
  const svg=drawObtuse(b,h,ext);
  return{svg,qText:'Find the area of this obtuse triangle.',ans:b*h/2,unit:'cm²'};
}

function generateQ(){
  answered=false;
  document.getElementById('badge').textContent=CFG[level].badge;
  document.getElementById('hint-box').textContent=CFG[level].hint;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  const q=level==='easy'?genEasy():level==='medium'?genMedium():genHard();
  correctAnswer=q.ans;
  document.getElementById('svg-wrap').innerHTML=q.nosvg?'':q.svg||'';
  document.getElementById('question-text').textContent=q.qText;
  const eq=document.getElementById('eq-row');
  eq.innerHTML='<span class="eq-label">Answer =</span><input class="ans-input" id="ans-input" type="number" placeholder="?" autocomplete="off" inputmode="numeric"/><span class="eq-label">'+q.unit+'</span>';
  document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});
  document.getElementById('check-btn').disabled=false;
  setTimeout(()=>{const i=document.getElementById('ans-input');if(i)i.focus();},80);
}

function submitAnswer(){
  if(answered)return;
  const inp=document.getElementById('ans-input');if(!inp)return;
  const raw=inp.value.trim();
  if(raw===''){inp.style.borderColor='#fbbf24';setTimeout(()=>{inp.style.borderColor='';},600);return;}
  const val=parseFloat(raw);if(isNaN(val))return;
  answered=true;inp.disabled=true;document.getElementById('check-btn').disabled=true;
  if(Math.abs(val-correctAnswer)<0.01){
    inp.classList.add('ok');streak++;
    let bonus=0,bonusMsg='';
    if(streak>=5){bonus=10;bonusMsg=' · ⚡ Hot streak! +10';}
    else if(streak>=3){bonus=5;bonusMsg=' · 🔥 +5 streak bonus!';}
    if(Math.random()<0.1){bonus+=5;bonusMsg+=' · 🍀 Lucky +5!';}
    pts+=10+bonus;if(pts>pb)pb=pts;qCount++;updateUI();
    document.getElementById('feedback').className='feedback ok';
    document.getElementById('feedback').textContent='✓ Correct! +10 pts'+bonusMsg;
    launchConfetti();
  } else {
    inp.classList.add('wrong');streak=0;qCount++;updateUI();
    document.getElementById('feedback').className='feedback wrong';
    document.getElementById('feedback').textContent='Not quite — the answer is '+correctAnswer;
  }
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,700);
}

function nextQ(){generateQ();}
function updateUI(){
  document.getElementById('pts-val').textContent=pts;document.getElementById('streak-val').textContent=streak;document.getElementById('pb-val').textContent=pb;
  document.getElementById('q-count').textContent=qCount+' / '+TOTAL;document.getElementById('prog-fill').style.width=(qCount/TOTAL*100)+'%';
  const m=document.getElementById('milestone');
  if(pts>=90)m.textContent='🏆 Brilliant!';else if(pts>=60)m.textContent='🌟 Next goal: 90 pts';else if(pts>=30)m.textContent='✅ Next goal: 60 pts';else m.textContent='🎯 First goal: 30 pts';
}
function showEndScreen(){
  const em=pts>=90?'🏆':pts>=60?'🌟':'💪';
  const msg=pts>=90?'Area ace!':pts>=60?'Great work!':'Keep practising!';
  document.getElementById('game-card').innerHTML='<div style="text-align:center;padding:16px 0;"><div style="font-size:3rem;">'+em+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.3rem;margin-top:8px;">'+msg+'</div><div style="font-size:.9rem;color:var(--soft);margin-top:6px;font-weight:700;">Score: '+pts+' pts · Best: '+pb+' pts</div><button onclick="resetGame()" style="margin-top:16px;font-family:\'Nunito\',sans-serif;font-weight:800;font-size:.9rem;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;">Play Again!</button></div>';
  if(pts>=90)launchConfetti(180);
}
function resetGame(){
  pts=0;streak=0;qCount=0;
  document.getElementById('game-card').innerHTML='<span class="badge" id="badge"></span><div class="hint-box" id="hint-box"></div><div class="svg-wrap" id="svg-wrap"></div><div class="question-text" id="question-text"></div><div class="eq-row" id="eq-row"></div><button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>';
  updateUI();generateQ();
}
generateQ();
function launchConfetti(n){n=n||55;const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=['#fca5a5','#34d399','#fbbf24','#f472b6','#60a5fa'];const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],ta:0,tai:Math.random()*.07+.04,vx:Math.random()*2-1,vy:Math.random()*3+2}));let ttl=110;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.tai;p.y+=p.vy;p.x+=p.vx;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);ctx.stroke();});if(--ttl>0)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();}
</script>
