<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount, GST & Interest</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--accent:#a855f7;--accent-lt:#d8b4fe;--accent-bg:#faf5ff;--bg:#faf5ff;--soft:#6b7280;--text:#3b0764;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 32px;color:var(--text);}
  header{text-align:center;margin-bottom:12px;}
  header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,1.9rem);color:var(--accent);}
  header p{font-size:.78rem;color:var(--soft);font-weight:700;margin-top:2px;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .level-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:6px 16px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;transition:all .16s;background:#fff;-webkit-tap-highlight-color:transparent;}
  .level-btn.easy{color:#16a34a;border-color:#4ade80;}.level-btn.medium{color:var(--accent);border-color:var(--accent-lt);}.level-btn.hard{color:#dc2626;border-color:#fca5a5;}
  .level-btn.easy.active{background:#4ade80;color:#fff;}.level-btn.medium.active{background:var(--accent-lt);color:#fff;}.level-btn.hard.active{background:#fca5a5;color:#fff;}
  /* Category selector */
  .cat-section{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:500px;margin-bottom:10px;}
  .cat-label{font-size:.72rem;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;}
  .cat-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .cat-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;padding:7px 16px;border:2.5px solid var(--accent-lt);border-radius:50px;cursor:pointer;background:#fff;color:var(--accent);transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .cat-btn.active{background:var(--accent);color:#fff;}
  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
  .stat-box{background:#fff;border-radius:14px;padding:7px 16px;text-align:center;min-width:78px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .stat-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.6rem;line-height:1.1;}
  .pts-box .stat-val{color:var(--accent);}.streak-box .stat-val{color:#f97316;}.pb-box .stat-val{color:#8b5cf6;}
  .prog-wrap{width:100%;max-width:500px;margin-bottom:12px;}
  .prog-track{background:#e5e7eb;border-radius:99px;height:11px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-lt),var(--accent));transition:width .4s;width:0%;}
  .prog-info{display:flex;justify-content:space-between;margin-top:3px;font-size:.7rem;font-weight:800;color:var(--soft);}
  .milestone{color:var(--accent);}
  .game-card{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(168,85,247,.1);border-top:5px solid var(--accent-lt);display:flex;flex-direction:column;align-items:center;gap:18px;}
  .badge{font-size:.72rem;font-weight:800;background:var(--accent-bg);color:var(--accent);padding:4px 14px;border-radius:50px;}
  .hint-box{background:var(--accent-bg);border-radius:12px;padding:8px 14px;font-size:.78rem;font-weight:700;color:var(--accent);text-align:center;width:100%;}
  .problem-card{background:#fdf4ff;border-radius:14px;padding:16px;font-size:.95rem;font-weight:700;color:var(--text);width:100%;border:2px solid var(--accent-lt);line-height:1.6;}
  .problem-card .ask{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--accent);margin-top:8px;}
  .ans-row{display:flex;align-items:center;gap:8px;justify-content:center;}
  .dollar{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2rem);color:var(--text);}
  .ans-input{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2rem);width:120px;text-align:center;border:3px solid #d1d5db;border-radius:14px;padding:8px;outline:none;background:#f9fafb;color:var(--text);-moz-appearance:textfield;}
  .ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .ans-input:focus{border-color:var(--accent-lt);background:var(--accent-bg);}
  .ans-input.ok{border-color:#16a34a;background:#dcfce7;color:#16a34a;}
  .ans-input.wrong{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .check-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #7e22ce;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .check-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #7e22ce;}
  .check-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #7e22ce;}
  .check-btn:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}
  .feedback{width:100%;border-radius:14px;padding:11px 14px;font-size:.88rem;font-weight:800;text-align:center;display:none;}
  .feedback.ok{background:#dcfce7;color:#16a34a;display:block;}
  .feedback.wrong{background:#fef3c7;color:#92400e;display:block;}
  .next-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:10px 30px;background:#60a5fa;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #2563eb;display:none;-webkit-tap-highlight-color:transparent;}
  .next-btn.show{display:block;}
  .reset-btn{margin-top:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:var(--soft);background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;cursor:pointer;}
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header><h1>🛒 Discount, GST &amp; Interest</h1><p>Primary 5 · Real-world percentage problems</p></header>
<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium" onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard" onclick="setLevel('hard')">💎 Hard</button>
</div>
<!-- Autonomy: choose problem category -->
<div class="cat-section">
  <div class="cat-label">Choose your problem type:</div>
  <div class="cat-btns">
    <button class="cat-btn active" id="cat-discount" onclick="setCat('discount')">🏷️ Discount</button>
    <button class="cat-btn" id="cat-gst" onclick="setCat('gst')">🧾 GST</button>
    <button class="cat-btn" id="cat-interest" onclick="setCat('interest')">🏦 Interest</button>
  </div>
</div>
<div class="stats-row">
  <div class="stat-box pts-box"><div class="stat-lbl">Points</div><div class="stat-val" id="pts-val">0</div></div>
  <div class="stat-box streak-box"><div class="stat-lbl">Streak</div><div class="stat-val" id="streak-val">0</div></div>
  <div class="stat-box pb-box"><div class="stat-lbl">Best</div><div class="stat-val" id="pb-val">0</div></div>
</div>
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-info"><span id="q-count">0 / 10</span><span class="milestone" id="milestone">🎯 First goal: 30 pts</span></div>
</div>
<div class="game-card" id="game-card">
  <span class="badge" id="badge"></span>
  <div class="hint-box" id="hint-box"></div>
  <div class="problem-card" id="problem-card"></div>
  <div class="ans-row" id="ans-row"></div>
  <button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset</button>
<script>
const TOTAL=10;
let pts=0,streak=0,pb=0,qCount=0,answered=false,level='easy',cat='discount';
let correctAnswer=0;
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const fmt2=(n)=>parseFloat(n.toFixed(2));

function setLevel(l){level=l;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.level-btn.'+l).classList.add('active');generateQ();}
function setCat(c){cat=c;['discount','gst','interest'].forEach(x=>document.getElementById('cat-'+x).classList.remove('active'));document.getElementById('cat-'+c).classList.add('active');generateQ();}

const ITEMS_CHEAP=['a pencil case','a notebook','a ruler','a rubber','a sticker book','a bookmark'];
const ITEMS_MED=['a bag','a shirt','a pair of shoes','a toy','a water bottle','a cap'];
const ITEMS_EXP=['a bicycle','a laptop bag','a sports kit','a school bag','a watch','a camera'];

const MEALS=['a chicken rice meal','a bowl of noodles','a set meal','a pizza','a café lunch'];
const PRODUCTS=['a sofa','a television','a refrigerator','a washing machine','a dining table'];
const SERVICES=['a haircut','a plumbing job','a cleaning service','a tuition package'];

function genDiscount(){
  let price,pct,ask;
  const difficulty=level;
  if(difficulty==='easy'){
    const prices=[20,40,50,60,80,100,120,150,200];price=prices[rand(0,prices.length-1)];pct=rand(1,4)*10;
    ask='What is the discount amount?';const disc=price*pct/100;return{text:'A '+ITEMS_MED[rand(0,ITEMS_MED.length-1)]+' costs $'+price+'. There is a '+pct+'% discount.',ask,ans:disc};
  }
  if(difficulty==='medium'){
    const prices=[48,64,75,85,120,160,200,250];price=prices[rand(0,prices.length-1)];pct=rand(1,8)*5;
    ask='What is the discounted price?';const disc=price*pct/100;return{text:'A '+ITEMS_MED[rand(0,ITEMS_MED.length-1)]+' costs $'+price+'. It is on sale at '+pct+'% off.',ask,ans:price-disc};
  }
  const prices=[68,84,96,128,144,192,256];price=prices[rand(0,prices.length-1)];
  const discPcts=[10,15,20,25,30];pct=discPcts[rand(0,discPcts.length-1)];
  const disc=price*pct/100;const discountedPrice=price-disc;
  ask='What is the original price of the item?';
  return{text:'After a '+pct+'% discount, '+ITEMS_EXP[rand(0,ITEMS_EXP.length-1)]+' costs $'+discountedPrice.toFixed(2)+'.',ask,ans:price};
}

function genGST(){
  let price,gst=9,ask;
  if(level==='easy'){
    const prices=[10,20,30,40,50,60,100];price=prices[rand(0,prices.length-1)];
    ask='What is the GST amount?';const tax=price*gst/100;return{text:MEALS[rand(0,MEALS.length-1)].charAt(0).toUpperCase()+MEALS[rand(0,MEALS.length-1)].slice(1)+' costs $'+price+'. GST is 9%.',ask,ans:fmt2(tax)};
  }
  if(level==='medium'){
    const prices=[15,25,35,45,55,65,80];price=prices[rand(0,prices.length-1)];
    ask='What is the total amount payable?';const tax=price*gst/100;return{text:'A '+PRODUCTS[rand(0,PRODUCTS.length-1)]+' costs $'+price+' before GST of 9%.',ask,ans:fmt2(price+tax)};
  }
  const prices=[120,180,200,240,320,450];price=prices[rand(0,prices.length-1)];
  const tax=price*gst/100;const totalWithGST=(price+tax).toFixed(2);
  ask='What was the price before GST?';
  return{text:'The total price of '+PRODUCTS[rand(0,PRODUCTS.length-1)]+' including 9% GST is $'+totalWithGST+'.',ask,ans:price};
}

function genInterest(){
  if(level==='easy'){
    const principals=[100,200,500,1000];const p=principals[rand(0,principals.length-1)];const r=rand(1,5);
    const interest=p*r/100;
    return{text:'Ali deposited $'+p+' in a bank at '+r+'% per year for 1 year.',ask:'How much interest does he earn?',ans:interest};
  }
  if(level==='medium'){
    const principals=[200,400,600,800,1000,1500];const p=principals[rand(0,principals.length-1)];const r=rand(2,6);
    const interest=p*r/100;
    return{text:'Siti saved $'+p+' at '+r+'% interest per year for 1 year.',ask:'What is the total amount she has at the end?',ans:p+interest};
  }
  // Hard: find the original amount deposited
  const principals=[400,500,600,800,1000,1200,1500,2000];const p=principals[rand(0,principals.length-1)];const r=rand(2,8);
  const interest=p*r/100;const total=p+interest;
  return{text:'After 1 year at '+r+'% interest per year, Raj has $'+total.toFixed(2)+' in total.',ask:'What was the amount he deposited?',ans:p};
}

const CFG={
  easy:{badge:'⭐ Find the calculated amount only',hints:{discount:'Discount = Original Price × Rate%',gst:'GST Amount = Price × 9%',interest:'Interest = Amount Deposited × Rate% (for 1 year)'}},
  medium:{badge:'🔥 Find the final amount',hint:'Discounted Price = Price − Discount  ·  Total with GST = Price + GST  ·  Bank Total = Amount Deposited + Interest'},
  hard:{badge:'💎 Find the original amount',hint:'Work backwards: Original Price = Final ÷ (1 − Rate%)  ·  Price before GST = Total ÷ 1.09  ·  Amount Deposited = Total ÷ (1 + Rate%)'}
};

function generateQ(){
  answered=false;
  document.getElementById('badge').textContent=CFG[level].badge;
  document.getElementById('hint-box').textContent=level==='easy'?CFG.easy.hints[cat]:CFG[level].hint;
  let q;
  if(cat==='discount')q=genDiscount();
  else if(cat==='gst')q=genGST();
  else q=genInterest();
  correctAnswer=fmt2(q.ans);
  const pc=document.getElementById('problem-card');
  pc.innerHTML='<div>'+q.text+'</div><div class="ask">'+q.ask+'</div>';
  const ar=document.getElementById('ans-row');
  ar.innerHTML='<span class="dollar">$</span><input class="ans-input" id="ans-input" type="number" step="0.01" placeholder="0.00" autocomplete="off" inputmode="decimal"/>';
  document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});
  document.getElementById('check-btn').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  setTimeout(()=>{const i=document.getElementById('ans-input');if(i)i.focus();},80);
}

function submitAnswer(){
  if(answered)return;
  const inp=document.getElementById('ans-input');if(!inp)return;
  const raw=inp.value.trim();
  if(raw===''){inp.style.borderColor='#fbbf24';setTimeout(()=>{inp.style.borderColor='';},600);return;}
  const val=parseFloat(raw);if(isNaN(val))return;
  answered=true;inp.disabled=true;document.getElementById('check-btn').disabled=true;
  const correct=Math.abs(val-correctAnswer)<0.015;
  if(correct){
    inp.classList.add('ok');streak++;
    let bonus=0,bonusMsg='';
    if(streak>=5){bonus=10;bonusMsg=' · ⚡ Hot streak! +10';}
    else if(streak>=3){bonus=5;bonusMsg=' · 🔥 +5 streak bonus!';}
    if(Math.random()<0.1){bonus+=5;bonusMsg+=' · 🍀 Lucky +5!';}
    pts+=10+bonus;if(pts>pb)pb=pts;qCount++;updateUI();
    const fb=document.getElementById('feedback');fb.className='feedback ok';fb.textContent='✓ Correct! +10 pts'+bonusMsg;
    launchConfetti();
  } else {
    inp.classList.add('wrong');streak=0;qCount++;updateUI();
    const fb=document.getElementById('feedback');fb.className='feedback wrong';
    fb.textContent='Not quite — the answer is $'+correctAnswer.toFixed(2);
  }
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,700);
}

function nextQ(){generateQ();}
function updateUI(){
  document.getElementById('pts-val').textContent=pts;document.getElementById('streak-val').textContent=streak;document.getElementById('pb-val').textContent=pb;
  document.getElementById('q-count').textContent=qCount+' / '+TOTAL;document.getElementById('prog-fill').style.width=(qCount/TOTAL*100)+'%';
  const m=document.getElementById('milestone');
  if(pts>=90)m.textContent='🏆 Brilliant!';else if(pts>=60)m.textContent='🌟 Next goal: 90 pts';else if(pts>=30)m.textContent='✅ Next goal: 60 pts';else m.textContent='🎯 First goal: 30 pts';
}
function showEndScreen(){
  const em=pts>=90?'🏆':pts>=60?'🌟':'💪';
  const msg=pts>=90?'Money maths master!':pts>=60?'Great work!':'Keep practising!';
  document.getElementById('game-card').innerHTML='<div style="text-align:center;padding:16px 0;"><div style="font-size:3rem;">'+em+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.3rem;margin-top:8px;">'+msg+'</div><div style="font-size:.9rem;color:var(--soft);margin-top:6px;font-weight:700;">Score: '+pts+' pts · Best: '+pb+' pts</div><button onclick="resetGame()" style="margin-top:16px;font-family:\'Nunito\',sans-serif;font-weight:800;font-size:.9rem;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;">Play Again!</button></div>';
  if(pts>=90)launchConfetti(180);
}
function resetGame(){
  pts=0;streak=0;qCount=0;
  document.getElementById('game-card').innerHTML='<span class="badge" id="badge"></span><div class="hint-box" id="hint-box"></div><div class="problem-card" id="problem-card"></div><div class="ans-row" id="ans-row"></div><button class="check-btn" id="check-btn" onclick="submitAnswer()">Check ✓</button><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>';
  updateUI();generateQ();
}
generateQ();
function launchConfetti(n){n=n||55;const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=['#d8b4fe','#34d399','#fbbf24','#f472b6','#60a5fa'];const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],ta:0,tai:Math.random()*.07+.04,vx:Math.random()*2-1,vy:Math.random()*3+2}));let ttl=110;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.tai;p.y+=p.vy;p.x+=p.vx;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);ctx.stroke();});if(--ttl>0)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();}
</script>
</body>
</html>
