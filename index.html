<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Maths Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#fafaf8;--text:#1c1917;--muted:#78716c;--card-shadow:0 4px 24px rgba(0,0,0,.08);}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 8% 15%,rgba(251,191,36,.12) 0%,transparent 30%),radial-gradient(circle at 92% 80%,rgba(129,140,248,.10) 0%,transparent 28%),radial-gradient(circle at 50% 50%,rgba(52,211,153,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
.hero{position:relative;z-index:1;text-align:center;padding:52px 20px 36px;}
.hero-tag{display:inline-block;font-size:.7rem;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;background:#f5f5f4;padding:4px 14px;border-radius:99px;border:1px solid #e7e5e4;}
.hero h1{font-family:'Fredoka One',cursive;font-size:clamp(2.4rem,8vw,4.2rem);line-height:1;letter-spacing:-.5px;color:var(--text);margin-bottom:12px;}
.hero h1 .accent{background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--muted);font-weight:700;max-width:420px;margin:0 auto;line-height:1.6;}
main{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:8px 20px 64px;}
.levels-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(min-width:560px){.levels-grid{grid-template-columns:repeat(3,1fr);}}
.level-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;border-radius:24px;padding:28px 16px 22px;box-shadow:var(--card-shadow);transition:transform .18s ease,box-shadow .18s ease;overflow:hidden;min-height:160px;-webkit-tap-highlight-color:transparent;opacity:0;animation:slideUp .45s ease forwards;}
.level-card::before{content:'';position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;opacity:.15;background:currentColor;}
.level-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,.13);}
.level-card:active{transform:translateY(-1px);}
.level-card.soon{opacity:.6 !important;cursor:default;}
.level-card.soon:hover{transform:none;box-shadow:var(--card-shadow);}
.level-num{font-family:'Fredoka One',cursive;font-size:2.6rem;line-height:1;margin-bottom:6px;}
.level-label{font-size:.72rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;opacity:.75;margin-bottom:10px;}
.level-count{font-size:.78rem;font-weight:800;background:rgba(255,255,255,.45);border-radius:99px;padding:3px 12px;}
.badge-soon{position:absolute;top:12px;right:12px;font-size:.6rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,.5);border-radius:99px;padding:2px 8px;}
.card-p1{background:linear-gradient(140deg,#fed7aa,#fb923c);color:#7c2d12;}
.card-p2{background:linear-gradient(140deg,#fef08a,#facc15);color:#713f12;}
.card-p3{background:linear-gradient(140deg,#bbf7d0,#4ade80);color:#14532d;}
.card-p4{background:linear-gradient(140deg,#a5f3fc,#22d3ee);color:#164e63;}
.card-p5{background:linear-gradient(140deg,#c4b5fd,#818cf8);color:#3730a3;}
.card-p6{background:linear-gradient(140deg,#fda4af,#f43f5e);color:#881337;}
.level-card:nth-child(1){animation-delay:.05s;}
.level-card:nth-child(2){animation-delay:.10s;}
.level-card:nth-child(3){animation-delay:.15s;}
.level-card:nth-child(4){animation-delay:.20s;}
.level-card:nth-child(5){animation-delay:.25s;}
.level-card:nth-child(6){animation-delay:.30s;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.level-card.soon{animation-delay:.25s;}
.doodle{position:fixed;font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,4vw,3rem);opacity:.05;pointer-events:none;user-select:none;color:#1c1917;animation:floatD 9s ease-in-out infinite;}
.doodle:nth-child(1){top:10%;left:3%;animation-delay:0s;}
.doodle:nth-child(2){top:65%;left:2%;animation-delay:-3s;font-size:2rem;}
.doodle:nth-child(3){top:20%;right:3%;animation-delay:-6s;}
.doodle:nth-child(4){top:75%;right:2%;animation-delay:-1.5s;font-size:2.2rem;}
@keyframes floatD{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-16px) rotate(4deg);}}
</style>
</head>
<body>
<div class="doodle" aria-hidden="true">+</div>
<div class="doodle" aria-hidden="true">×</div>
<div class="doodle" aria-hidden="true">÷</div>
<div class="doodle" aria-hidden="true">%</div>
<header class="hero">
  <h1>Primary<br><span class="accent">Maths Games</span></h1>
  <p>Choose your level and start practising!</p>
</header>
<main>
  <div class="levels-grid">
    <a class="level-card card-p1" href="p1-games.html">
      <div class="level-num">P1</div>
      <div class="level-label">Primary 1</div>
      <div class="level-count">15 games</div>
    </a>
    <a class="level-card card-p2 soon" href="#">
      <div class="level-num">P2</div>
      <div class="level-label">Primary 2</div>
      <div class="level-count">Coming soon</div>
      <span class="badge-soon">Soon</span>
    </a>
    <a class="level-card card-p3 soon" href="#">
      <div class="level-num">P3</div>
      <div class="level-label">Primary 3</div>
      <div class="level-count">Coming soon</div>
      <span class="badge-soon">Soon</span>
    </a>
    <a class="level-card card-p4 soon" href="#">
      <div class="level-num">P4</div>
      <div class="level-label">Primary 4</div>
      <div class="level-count">Coming soon</div>
      <span class="badge-soon">Soon</span>
    </a>
    <a class="level-card card-p5" href="p5-games.html">
      <div class="level-num">P5</div>
      <div class="level-label">Primary 5</div>
      <div class="level-count">13 games</div>
    </a>
    <a class="level-card card-p6 soon" href="#">
      <div class="level-num">P6</div>
      <div class="level-label">Primary 6</div>
      <div class="level-count">Coming soon</div>
      <span class="badge-soon">Soon</span>
    </a>
  </div>
</main>
</body>
</html>
