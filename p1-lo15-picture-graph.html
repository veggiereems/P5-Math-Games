<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff7ed;--orange:#ea580c;--orange-lt:#fb923c;--orange-bg:#ffedd5;
    --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
    --blue:#2563eb;--blue-lt:#60a5fa;--soft:#6b7280;--text:#431407;--card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:16px 12px 32px;color:var(--text);}
  header{text-align:center;margin-bottom:14px;}
  header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,4vw,2.1rem);color:var(--orange);}
  header p{font-size:0.82rem;color:var(--soft);margin-top:2px;font-weight:700;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .level-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;padding:7px 18px;
    border:2.5px solid transparent;border-radius:50px;cursor:pointer;transition:all 0.16s;
    background:white;-webkit-tap-highlight-color:transparent;}
  .level-btn.easy{color:var(--green);border-color:#4ade80;}.level-btn.medium{color:var(--orange);border-color:var(--orange-lt);}.level-btn.hard{color:var(--blue);border-color:var(--blue-lt);}
  .level-btn.easy.active{background:#4ade80;color:white;}.level-btn.medium.active{background:var(--orange-lt);color:white;}.level-btn.hard.active{background:var(--blue-lt);color:white;}
  .scoreboard{display:flex;gap:10px;margin-bottom:12px;}
  .score-box{background:white;border-radius:12px;padding:6px 18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);min-width:76px;}
  .score-box .lbl{font-size:0.63rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);}
  .score-box .val{font-family:'Fredoka One',cursive;font-size:1.6rem;line-height:1.1;}
  .score-box.c .val{color:var(--green);}.score-box.w .val{color:var(--red);}.score-box.t .val{color:var(--blue);}
  .game-card{background:var(--card);border-radius:20px;padding:22px 18px;width:100%;max-width:500px;
    box-shadow:0 8px 32px rgba(234,88,12,0.1);border-top:5px solid var(--orange-lt);
    display:flex;flex-direction:column;align-items:center;gap:16px;}
  /* Graph */
  .graph-container{width:100%;background:#fafafa;border-radius:14px;padding:14px 10px;border:2px solid #e5e7eb;}
  .graph-title{font-family:'Fredoka One',cursive;font-size:0.95rem;color:var(--text);text-align:center;margin-bottom:10px;}
  .graph-rows{display:flex;flex-direction:column;gap:6px;}
  .graph-row{display:flex;align-items:center;gap:8px;}
  .row-label{font-size:0.78rem;font-weight:800;min-width:70px;text-align:right;color:var(--text);flex-shrink:0;}
  .row-icons{display:flex;gap:4px;flex-wrap:wrap;}
  .icon-cell{font-size:1.4rem;line-height:1;width:28px;text-align:center;}
  .graph-key{font-size:0.7rem;font-weight:800;color:var(--soft);text-align:center;margin-top:8px;}
  /* Question */
  .q-text{font-size:0.95rem;font-weight:800;text-align:center;color:var(--text);padding:0 4px;line-height:1.4;}
  .options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
  .opt-btn{font-family:'Fredoka One',cursive;font-size:1.3rem;padding:12px 4px;
    border:3px solid #e5e7eb;border-radius:14px;background:#f9fafb;cursor:pointer;
    transition:all 0.15s;color:var(--text);-webkit-tap-highlight-color:transparent;}
  .opt-btn:hover{border-color:var(--orange-lt);background:var(--orange-bg);transform:translateY(-2px);}
  .opt-btn.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);}
  .opt-btn.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);}
  .opt-btn.reveal{border-color:var(--green);background:var(--green-bg);color:var(--green);}
  .opt-btn:disabled{cursor:default;transform:none;}
  .feedback{width:100%;border-radius:14px;padding:10px 14px;font-size:0.9rem;font-weight:800;text-align:center;display:none;}
  .feedback.ok{background:var(--green-bg);color:var(--green);display:block;}
  .feedback.err{background:var(--red-bg);color:var(--red);display:block;}
  .next-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:10px 30px;
    background:var(--blue-lt);color:white;border:none;border-radius:14px;cursor:pointer;
    box-shadow:0 4px 0 var(--blue);display:none;-webkit-tap-highlight-color:transparent;}
  .next-btn.show{display:block;}
  .progress-wrap{width:100%;max-width:500px;margin-top:6px;}
  .prog-track{background:#e5e7eb;border-radius:99px;height:9px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange-lt),var(--blue-lt));transition:width 0.35s;width:0%;}
  .prog-label{font-size:0.72rem;color:var(--soft);text-align:right;margin-top:3px;font-weight:800;}
  .reset-btn{margin-top:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.76rem;
    color:var(--soft);background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;cursor:pointer;}
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header><h1>📊 Picture Graph</h1><p>Primary 1 · Read & Interpret</p></header>
<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium" onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard" onclick="setLevel('hard')">💎 Hard</button>
</div>
<div class="scoreboard">
  <div class="score-box c"><div class="lbl">Correct</div><div class="val" id="sc-c">0</div></div>
  <div class="score-box w"><div class="lbl">Wrong</div><div class="val" id="sc-w">0</div></div>
  <div class="score-box t"><div class="lbl">Total</div><div class="val" id="sc-t">0</div></div>
</div>
<div class="game-card">
  <div class="graph-container" id="graph-container">
    <div class="graph-title" id="graph-title"></div>
    <div class="graph-rows" id="graph-rows"></div>
    <div class="graph-key" id="graph-key"></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>
<div class="progress-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-label" id="prog-label">0 / 10 questions</div>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset Score</button>
<a href="index.html" style="margin-top:4px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:#6b7280;background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;text-decoration:none;display:inline-block;">🏠 Home</a>
<script>
// easy:   3 categories, values 1-5, read a single bar directly
// medium: 4 categories, values 1-8, read + simple comparison (most/least)
// hard:   4 categories, values 2-10, total or difference questions

const TOPICS=[
  {title:'Favourite Fruits',
   categories:[{name:'Apple',icon:'🍎'},{name:'Banana',icon:'🍌'},{name:'Mango',icon:'🥭'},{name:'Orange',icon:'🍊'}]},
  {title:'Pets at Home',
   categories:[{name:'Dog',icon:'🐶'},{name:'Cat',icon:'🐱'},{name:'Fish',icon:'🐟'},{name:'Bird',icon:'🐦'}]},
  {title:'Favourite Colours',
   categories:[{name:'Red',icon:'🔴'},{name:'Blue',icon:'🔵'},{name:'Green',icon:'🟢'},{name:'Yellow',icon:'🟡'}]},
  {title:'Transport to School',
   categories:[{name:'Bus',icon:'🚌'},{name:'Car',icon:'🚗'},{name:'Walk',icon:'🚶'},{name:'MRT',icon:'🚇'}]},
  {title:'Favourite Sports',
   categories:[{name:'Football',icon:'⚽'},{name:'Badminton',icon:'🏸'},{name:'Swimming',icon:'🏊'},{name:'Running',icon:'🏃'}]},
];

let level='easy', sc=0, sw=0, st=0, qCount=0;
const TOTAL=10; let correctAnswer=0, answered=false;
let currentData=null, currentTopic=null;
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function setLevel(l){level=l;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.level-btn.'+l).classList.add('active');resetGame();}

function generateQ(){
  answered=false;
  currentTopic=TOPICS[rand(0,TOPICS.length-1)];
  const cats=level==='easy'?currentTopic.categories.slice(0,3):currentTopic.categories;
  const maxVal=level==='easy'?5:level==='medium'?8:10;
  const minVal=level==='hard'?2:1;
  // data: array of {name, icon, count}
  const data=cats.map(c=>({name:c.name, icon:c.icon, count:rand(minVal,maxVal)}));
  currentData=data;

  // Render graph
  document.getElementById('graph-title').textContent=currentTopic.title;
  document.getElementById('graph-key').textContent='Each icon = 1 student';
  const rowsDiv=document.getElementById('graph-rows');
  rowsDiv.innerHTML='';
  data.forEach(c=>{
    const row=document.createElement('div');row.className='graph-row';
    const lbl=document.createElement('div');lbl.className='row-label';lbl.textContent=c.name;
    const icons=document.createElement('div');icons.className='row-icons';
    for(let i=0;i<c.count;i++){
      const ic=document.createElement('div');ic.className='icon-cell';ic.textContent=c.icon;icons.appendChild(ic);
    }
    row.appendChild(lbl);row.appendChild(icons);rowsDiv.appendChild(row);
  });

  // Generate question
  const {qText, answer}=generateQuestion(data);
  document.getElementById('q-text').textContent=qText;
  correctAnswer=answer;

  // Options: answer + 3 wrong
  const opts=new Set([answer]);
  while(opts.size<4){
    const w=answer+rand(-3,3);
    if(w!==answer&&w>=0&&w<=maxVal*4)opts.add(w);
  }
  const shuffled=[...opts].sort(()=>Math.random()-0.5);
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  shuffled.forEach(v=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=v;
    btn.onclick=()=>selectOpt(btn,v);
    optDiv.appendChild(btn);
  });

  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
}

function generateQuestion(data){
  if(level==='easy'){
    const c=data[rand(0,data.length-1)];
    return{qText:'How many students chose '+c.name+'?',answer:c.count};
  }
  if(level==='medium'){
    const r=rand(0,2);
    if(r===0){const c=data[rand(0,data.length-1)];return{qText:'How many students chose '+c.name+'?',answer:c.count};}
    if(r===1){const maxC=data.reduce((a,b)=>b.count>a.count?b:a);return{qText:'Which category has the most? How many?',answer:maxC.count};}
    const minC=data.reduce((a,b)=>b.count<a.count?b:a);return{qText:'Which category has the least? How many?',answer:minC.count};
  }
  const r=rand(0,2);
  if(r===0){const total=data.reduce((s,c)=>s+c.count,0);return{qText:'How many students are there in total?',answer:total};}
  if(r===1){
    const c1=data[rand(0,data.length-1)];
    let c2=data[rand(0,data.length-1)];
    while(c2.name===c1.name)c2=data[rand(0,data.length-1)];
    return{qText:'How many more chose '+c1.name+' than '+c2.name+'?',answer:Math.abs(c1.count-c2.count)};
  }
  const c=data[rand(0,data.length-1)];return{qText:'How many students chose '+c.name+'?',answer:c.count};
}

function selectOpt(btn,val){
  if(answered)return;answered=true;st++;qCount++;
  const correct=val===correctAnswer;
  if(correct){sc++;btn.classList.add('correct');launchConfetti();}
  else{sw++;btn.classList.add('wrong');document.querySelectorAll('.opt-btn').forEach(b=>{if(parseInt(b.textContent)===correctAnswer)b.classList.add('reveal');});}
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(correct?'ok':'err');
  fb.textContent=correct?'🎉 Correct! The answer is '+correctAnswer:'❌ The answer is '+correctAnswer;
  updateScore();updateProgress();
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,800);
}
function nextQ(){generateQ();}
function updateScore(){document.getElementById('sc-c').textContent=sc;document.getElementById('sc-w').textContent=sw;document.getElementById('sc-t').textContent=st;}
function updateProgress(){document.getElementById('prog-fill').style.width=(qCount/TOTAL*100)+'%';document.getElementById('prog-label').textContent=qCount+' / '+TOTAL+' questions';}
function showEndScreen(){
  const pct=Math.round(sc/TOTAL*100);
  const msg=pct===100?'Graph genius!':pct>=70?'Great reading!':'Keep practising!';
  const em=pct===100?'🏆':pct>=70?'🌟':'💪';
  document.getElementById('graph-container').innerHTML='<div style="text-align:center;padding:16px 0;"><div style="font-size:2.8rem;">'+em+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.2rem;margin-top:8px;">'+msg+'</div><div style="font-size:0.9rem;color:var(--soft);margin-top:5px;font-weight:700;">Score: '+sc+' / '+TOTAL+' ('+pct+'%)</div><button onclick="resetGame()" style="margin-top:14px;font-family:\'Nunito\',sans-serif;font-weight:800;font-size:0.9rem;padding:9px 26px;background:var(--orange-lt);color:white;border:none;border-radius:12px;cursor:pointer;">Play Again!</button></div>';
  document.getElementById('q-text').textContent='';document.getElementById('options').innerHTML='';
  document.getElementById('feedback').className='feedback';document.getElementById('next-btn').classList.remove('show');
  if(pct===100)launchConfetti(180);
}
function resetGame(){sc=sw=st=qCount=0;updateScore();updateProgress();
  document.getElementById('graph-container').innerHTML='<div class="graph-title" id="graph-title"></div><div class="graph-rows" id="graph-rows"></div><div class="graph-key" id="graph-key"></div>';
  document.getElementById('q-text').textContent='';
  document.getElementById('options').innerHTML='';
  generateQ();}
function launchConfetti(n){n=n||55;const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=['#fb923c','#60a5fa','#4ade80','#f472b6','#fbbf24'];const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],ta:0,tai:Math.random()*0.07+0.04,vx:Math.random()*2-1,vy:Math.random()*3+2}));let ttl=110;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.tai;p.y+=p.vy;p.x+=p.vx;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);ctx.stroke();});if(--ttl>0)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();}
generateQ();
</script>
</body>
</html>
