<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--accent:#b45309;--accent-lt:#fcd34d;--accent-bg:#fffbeb;--bg:#fffbeb;--soft:#6b7280;--text:#451a03;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 32px;color:var(--text);}
  header{text-align:center;margin-bottom:12px;}
  header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,2rem);color:var(--accent);}
  header p{font-size:.78rem;color:var(--soft);font-weight:700;margin-top:2px;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .level-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:6px 16px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;background:#fff;-webkit-tap-highlight-color:transparent;}
  .level-btn.easy{color:#16a34a;border-color:#4ade80;}.level-btn.medium{color:var(--accent);border-color:var(--accent-lt);}.level-btn.hard{color:#dc2626;border-color:#fca5a5;}
  .level-btn.easy.active{background:#4ade80;color:#fff;}.level-btn.medium.active{background:var(--accent-lt);color:var(--text);}.level-btn.hard.active{background:#fca5a5;color:#fff;}
  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
  .stat-box{background:#fff;border-radius:14px;padding:7px 16px;text-align:center;min-width:78px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .stat-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--soft);}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.6rem;line-height:1.1;}
  .pts-box .stat-val{color:var(--accent);}.streak-box .stat-val{color:#f97316;}.pb-box .stat-val{color:#8b5cf6;}
  .prog-wrap{width:100%;max-width:500px;margin-bottom:12px;}
  .prog-track{background:#e5e7eb;border-radius:99px;height:11px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-lt),var(--accent));transition:width .4s;width:0%;}
  .prog-info{display:flex;justify-content:space-between;margin-top:3px;font-size:.7rem;font-weight:800;color:var(--soft);}
  .milestone{color:var(--accent);}
  .game-card{background:#fff;border-radius:20px;padding:22px 18px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(180,83,9,.1);border-top:5px solid var(--accent-lt);display:flex;flex-direction:column;align-items:center;gap:14px;}
  .badge{font-size:.72rem;font-weight:800;background:var(--accent-bg);color:var(--accent);padding:4px 14px;border-radius:50px;}
  .hint-box{background:var(--accent-bg);border-radius:12px;padding:8px 14px;font-size:.78rem;font-weight:700;color:var(--accent);text-align:center;width:100%;}
  .svg-wrap{width:100%;max-width:220px;margin:0 auto;}
  svg{width:100%;height:auto;}
  .question-text{font-size:.95rem;font-weight:800;text-align:center;color:var(--text);line-height:1.5;}
  .options{display:flex;flex-direction:column;gap:9px;width:100%;}
  .opt-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;padding:12px 16px;border:3px solid #e5e7eb;border-radius:14px;background:#f9fafb;cursor:pointer;text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1.4;}
  .opt-btn:hover{border-color:var(--accent-lt);background:var(--accent-bg);}
  .opt-btn.correct{border-color:#16a34a;background:#dcfce7;color:#166534;}
  .opt-btn.wrong{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .opt-btn.reveal{border-color:#16a34a;background:#dcfce7;}
  .opt-btn:disabled{cursor:default;}
  /* For hard: number input for unknown angle */
  .ans-row{display:flex;align-items:center;gap:8px;justify-content:center;}
  .ans-input{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2rem);width:100px;text-align:center;border:3px solid #d1d5db;border-radius:14px;padding:8px;outline:none;background:#f9fafb;color:var(--text);-moz-appearance:textfield;}
  .ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .ans-input:focus{border-color:var(--accent-lt);background:var(--accent-bg);}
  .ans-input.ok{border-color:#16a34a;background:#dcfce7;color:#16a34a;}
  .ans-input.wrong{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .deg-sym{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--soft);}
  .check-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:11px 32px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #92400e;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .check-btn:hover{transform:translateY(-2px);}.check-btn:active{transform:translateY(2px);}
  .check-btn:disabled{opacity:.4;cursor:default;transform:none;}
  .feedback{width:100%;border-radius:14px;padding:11px 14px;font-size:.88rem;font-weight:800;text-align:center;display:none;}
  .feedback.ok{background:#dcfce7;color:#16a34a;display:block;}
  .feedback.wrong{background:#fef3c7;color:#92400e;display:block;}
  .next-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:10px 30px;background:#60a5fa;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #2563eb;display:none;-webkit-tap-highlight-color:transparent;}
  .next-btn.show{display:block;}
  .reset-btn{margin-top:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:var(--soft);background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;cursor:pointer;}
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header><h1>🔺 Triangle Properties</h1><p>Primary 5 · Isosceles, equilateral, right-angled</p></header>
<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium" onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard" onclick="setLevel('hard')">💎 Hard</button>
</div>
<div class="stats-row">
  <div class="stat-box pts-box"><div class="stat-lbl">Points</div><div class="stat-val" id="pts-val">0</div></div>
  <div class="stat-box streak-box"><div class="stat-lbl">Streak</div><div class="stat-val" id="streak-val">0</div></div>
  <div class="stat-box pb-box"><div class="stat-lbl">Best</div><div class="stat-val" id="pb-val">0</div></div>
</div>
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-info"><span id="q-count">0 / 10</span><span class="milestone" id="milestone">🎯 First goal: 30 pts</span></div>
</div>
<div class="game-card" id="game-card">
  <span class="badge" id="badge"></span>
  <div class="hint-box" id="hint-box"></div>
  <div class="svg-wrap" id="svg-wrap"></div>
  <div class="question-text" id="question-text"></div>
  <div class="options" id="options"></div>
  <div id="num-area"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset</button>
<a href="index.html" style="margin-top:4px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:#6b7280;background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;text-decoration:none;display:inline-block;">🏠 Home</a>
<script>
const TOTAL=10;
let pts=0,streak=0,pb=0,qCount=0,answered=false,level='easy';
let correctAnswer='',numAnswer=0,qMode='';
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

const CFG={
  easy:{badge:'⭐ Name the triangle type',hint:'Equilateral: 3 equal sides, 3×60° · Isosceles: 2 equal sides/angles · Right-angled: one 90° angle'},
  medium:{badge:'🔥 Match the property to the triangle',hint:'Which triangle has this property?'},
  hard:{badge:'💎 Find an unknown angle',hint:'Use: angle sum of triangle = 180°. Apply triangle properties to find equal angles.'}
};

function setLevel(l){level=l;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.level-btn.'+l).classList.add('active');generateQ();}

function triSVG(type,angles,tickSides){
  let pts3;
  if(type==='equilateral'){pts3=[[100,20],[185,165],[15,165]];}
  else if(type==='isosceles'){pts3=[[100,20],[175,165],[25,165]];}
  else{pts3=[[30,20],[30,165],[175,165]];} // right
  const svg_pts=pts3.map(p=>p.join(',')).join(' ');
  let svg=`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<polygon points="${svg_pts}" fill="#fef3c7" stroke="${type==='right'?'#b45309':'#b45309'}" stroke-width="2.5" stroke-linejoin="round"/>`;
  if(type==='right'){
    svg+=`<polyline points="30,145 50,145 50,165" fill="none" stroke="#b45309" stroke-width="2"/>`;
  }
  if(type==='equilateral'||type==='isosceles'){
    const sides=type==='equilateral'?[[0,1],[1,2],[2,0]]:[[0,1],[0,2]];
    sides.forEach(([a,b])=>{
      const mx=(pts3[a][0]+pts3[b][0])/2,my=(pts3[a][1]+pts3[b][1])/2;
      const dx=pts3[b][0]-pts3[a][0],dy=pts3[b][1]-pts3[a][1];
      const len=Math.sqrt(dx*dx+dy*dy);
      const nx=-dy/len*6,ny=dx/len*6;
      svg+=`<line x1="${(mx+nx).toFixed(1)}" y1="${(my+ny).toFixed(1)}" x2="${(mx-nx).toFixed(1)}" y2="${(my-ny).toFixed(1)}" stroke="#b45309" stroke-width="2"/>`;
    });
  }
  // Angle labels with fixed offsets per vertex per shape
  if(angles){
    // offsets push labels away from vertices, inward toward triangle centre
    const cx=pts3.reduce((s,p)=>s+p[0],0)/3;
    const cy=pts3.reduce((s,p)=>s+p[1],0)/3;
    angles.forEach((a,i)=>{
      if(a!==null){
        const vx=pts3[i][0],vy=pts3[i][1];
        // Push label toward centroid
        const dx=cx-vx,dy=cy-vy;
        const len=Math.sqrt(dx*dx+dy*dy);
        const lx=vx+dx/len*22;
        const ly=vy+dy/len*22;
        svg+=`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-family="Fredoka One,cursive" font-size="14" fill="${a==='?'?'#dc2626':'#92400e'}">${a}</text>`;
      }
    });
  }
  svg+=`</svg>`;
  return svg;
}

const EASY_QS=[
  {type:'equilateral',q:'What type of triangle is this?',ans:'equilateral'},
  {type:'isosceles',q:'What type of triangle is this?',ans:'isosceles'},
  {type:'right',q:'What type of triangle is this?',ans:'right-angled'},
  {type:'equilateral',q:'What type of triangle has all sides equal?',ans:'equilateral'},
  {type:'isosceles',q:'What type of triangle has exactly two equal sides?',ans:'isosceles'},
  {type:'right',q:'What type of triangle has one angle equal to 90°?',ans:'right-angled'},
];

const MED_PROPERTIES=[
  {prop:'All three angles are 60°.',ans:'equilateral',svg:'equilateral'},
  {prop:'Two of its angles are always equal.',ans:'isosceles',svg:'isosceles'},
  {prop:'The sum of its two smaller angles is always 90°.',ans:'right-angled',svg:'right'},
  {prop:'All three sides have the same length.',ans:'equilateral',svg:'equilateral'},
  {prop:'It has a line of symmetry but is not equilateral.',ans:'isosceles',svg:'isosceles'},
  {prop:'One of its angles is always a right angle.',ans:'right-angled',svg:'right'},
  {prop:'It has exactly three lines of symmetry.',ans:'equilateral',svg:'equilateral'},
  {prop:'Two of its sides are equal in length.',ans:'isosceles',svg:'isosceles'},
  {prop:'The longest side is always opposite the 90° angle.',ans:'right-angled',svg:'right'},
  {prop:'The perimeter equals 3 times the length of one side.',ans:'equilateral',svg:'equilateral'},
];

function genEasy(){const q=EASY_QS[rand(0,EASY_QS.length-1)];return{svg:triSVG(q.type,null,null),qText:q.q,ans:q.ans,opts:['Equilateral','Isosceles','Right-angled'].sort(()=>Math.random()-.5)};}
function genMedium(){const q=MED_PROPERTIES[rand(0,MED_PROPERTIES.length-1)];return{svg:triSVG(q.svg,null,null),qText:'Which triangle has this property?\n"'+q.prop+'"',ans:q.ans,opts:['Equilateral','Isosceles','Right-angled'].sort(()=>Math.random()-.5)};}

function genHard(){
  const t=rand(0,1);
  if(t===0){
    const base=rand(20,70);const apex=180-2*base;
    const ask=rand(0,1)?'apex':'base';
    if(ask==='apex'){
      return{svg:triSVG('isosceles',[null,base+'°',base+'°'],null),qText:'This is an isosceles triangle. The two labelled angles are '+base+'° each.\nFind the value of the unknown angle.',ans:apex,mode:'number'};
    }
    return{svg:triSVG('isosceles',[apex+'°','?',null],null),qText:'This is an isosceles triangle. The labelled angle is '+apex+'°.\nFind the value of the unknown angle.',ans:base,mode:'number'};
  }
  const a=rand(20,70);const b=90-a;
  return{svg:triSVG('right',[a+'°',null,'?'],null),qText:'This is a right-angled triangle. One angle is '+a+'°.\nFind the missing angle.',ans:b,mode:'number'};
}

function generateQ(){
  answered=false;
  document.getElementById('badge').textContent=CFG[level].badge;
  document.getElementById('hint-box').textContent=CFG[level].hint;
  document.getElementById('options').innerHTML='';
  document.getElementById('num-area').innerHTML='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  let q;
  if(level==='easy'){q=genEasy();qMode='mcq';}
  else if(level==='medium'){q=genMedium();qMode='mcq';}
  else{q=genHard();qMode=q.mode||'mcq';}
  document.getElementById('svg-wrap').innerHTML=q.svg;
  document.getElementById('question-text').textContent=q.qText;
  if(qMode==='mcq'){
    correctAnswer=q.ans;
    const opts=document.getElementById('options');
    (q.opts||['Equilateral','Isosceles','Right-angled']).forEach(o=>{
      const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
      btn.dataset.val=o.toLowerCase();
      btn.onclick=()=>selectOpt(btn,o.toLowerCase());
      opts.appendChild(btn);
    });
  } else {
    numAnswer=q.ans;
    document.getElementById('num-area').innerHTML='<div class="ans-row"><input class="ans-input" id="ans-input" type="number" placeholder="?" autocomplete="off" inputmode="numeric"/><span class="deg-sym">°</span></div><button class="check-btn" id="check-btn" onclick="submitNumber()">Check ✓</button>';
    document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitNumber();});
    setTimeout(()=>{const i=document.getElementById('ans-input');if(i)i.focus();},80);
  }
}

function selectOpt(btn,val){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(val===correctAnswer||val===correctAnswer.replace('-','').replace(' ','')||correctAnswer.includes(val)){
    btn.classList.add('correct');handleCorrect();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.val===correctAnswer||correctAnswer.includes(b.dataset.val))b.classList.add('reveal');});
    handleWrong('Not quite — the answer is '+correctAnswer);
  }
}
function submitNumber(){
  if(answered)return;
  const inp=document.getElementById('ans-input');if(!inp)return;
  const raw=inp.value.trim();
  if(raw===''){inp.style.borderColor='#fbbf24';setTimeout(()=>{inp.style.borderColor='';},600);return;}
  const val=parseInt(raw,10);if(isNaN(val))return;
  answered=true;inp.disabled=true;if(document.getElementById('check-btn'))document.getElementById('check-btn').disabled=true;
  if(val===numAnswer){inp.classList.add('ok');handleCorrect();}
  else{inp.classList.add('wrong');handleWrong('Not quite — the answer is '+numAnswer+'°');}
}
function handleCorrect(){
  streak++;let bonus=0,bonusMsg='';
  if(streak>=5){bonus=10;bonusMsg=' · ⚡ Hot streak! +10';}
  else if(streak>=3){bonus=5;bonusMsg=' · 🔥 +5 streak bonus!';}
  if(Math.random()<0.1){bonus+=5;bonusMsg+=' · 🍀 Lucky +5!';}
  pts+=10+bonus;if(pts>pb)pb=pts;qCount++;updateUI();
  document.getElementById('feedback').className='feedback ok';
  document.getElementById('feedback').textContent='✓ Correct! +10 pts'+bonusMsg;
  launchConfetti();
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,700);
}
function handleWrong(msg){
  streak=0;qCount++;updateUI();
  document.getElementById('feedback').className='feedback wrong';
  document.getElementById('feedback').textContent=msg;
  if(qCount<TOTAL)document.getElementById('next-btn').classList.add('show');
  else setTimeout(showEndScreen,700);
}
function nextQ(){generateQ();}
function updateUI(){
  document.getElementById('pts-val').textContent=pts;document.getElementById('streak-val').textContent=streak;document.getElementById('pb-val').textContent=pb;
  document.getElementById('q-count').textContent=qCount+' / '+TOTAL;document.getElementById('prog-fill').style.width=(qCount/TOTAL*100)+'%';
  const m=document.getElementById('milestone');
  if(pts>=90)m.textContent='🏆 Brilliant!';else if(pts>=60)m.textContent='🌟 Next goal: 90 pts';else if(pts>=30)m.textContent='✅ Next goal: 60 pts';else m.textContent='🎯 First goal: 30 pts';
}
function showEndScreen(){
  const em=pts>=90?'🏆':pts>=60?'🌟':'💪';
  const msg=pts>=90?'Triangle expert!':pts>=60?'Great work!':'Keep practising!';
  document.getElementById('game-card').innerHTML='<div style="text-align:center;padding:16px 0;"><div style="font-size:3rem;">'+em+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.3rem;margin-top:8px;">'+msg+'</div><div style="font-size:.9rem;color:var(--soft);margin-top:6px;font-weight:700;">Score: '+pts+' pts · Best: '+pb+' pts</div><button onclick="resetGame()" style="margin-top:16px;font-family:\'Nunito\',sans-serif;font-weight:800;font-size:.9rem;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;">Play Again!</button></div>';
  if(pts>=90)launchConfetti(180);
}
function resetGame(){
  pts=0;streak=0;qCount=0;
  document.getElementById('game-card').innerHTML='<span class="badge" id="badge"></span><div class="hint-box" id="hint-box"></div><div class="svg-wrap" id="svg-wrap"></div><div class="question-text" id="question-text"></div><div class="options" id="options"></div><div id="num-area"></div><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>';
  updateUI();generateQ();
}
generateQ();
function launchConfetti(n){n=n||55;const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=['#fcd34d','#34d399','#f97316','#f472b6','#60a5fa'];const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],ta:0,tai:Math.random()*.07+.04,vx:Math.random()*2-1,vy:Math.random()*3+2}));let ttl=110;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.tai;p.y+=p.vy;p.x+=p.vx;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);ctx.stroke();});if(--ttl>0)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();}
</script>
</body>
</html>
