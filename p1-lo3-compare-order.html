<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare & Order Numbers</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f0fdfa;
    --surface:  #ffffff;
    --surface2: #ccfbf1;
    --indigo:   #0d9488;
    --indigo-l: #2dd4bf;
    --pink:     #ec4899;
    --pink-l:   #f472b6;
    --green:    #16a34a;
    --green-dk: #15803d;
    --red:      #ef4444;
    --red-dk:   #b91c1c;
    --text:     #134e4a;
    --muted:    #6b7280;
    --radius:   16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(99,102,241,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(236,72,153,0.15) 0%, transparent 50%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 12px 32px;
    color: var(--text);
  }

  header { text-align: center; margin-bottom: 14px; }
  header h1 {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    background: linear-gradient(90deg, var(--indigo-l), var(--pink-l));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { font-size: 0.8rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
  .level-btn {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
    padding: 7px 18px; border: 2px solid transparent; border-radius: 50px;
    cursor: pointer; transition: all 0.16s; background: var(--surface); color: var(--muted);
  }
  .level-btn.easy   { border-color: rgba(34,197,94,0.3); }
  .level-btn.medium { border-color: rgba(99,102,241,0.3); }
  .level-btn.hard   { border-color: rgba(236,72,153,0.3); }
  .level-btn.easy.active   { background: rgba(34,197,94,0.15);  border-color: var(--green);    color: var(--green); }
  .level-btn.medium.active { background: rgba(99,102,241,0.15); border-color: var(--indigo-l); color: var(--indigo-l); }
  .level-btn.hard.active   { background: rgba(236,72,153,0.15); border-color: var(--pink);     color: var(--pink); }
  .level-btn:hover { transform: translateY(-2px); }

  .scoreboard { display: flex; gap: 10px; margin-bottom: 12px; }
  .score-box {
    background: var(--surface); border-radius: 12px; padding: 6px 18px;
    text-align: center; min-width: 74px; border: 1px solid var(--surface2);
  }
  .score-box .lbl { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .score-box .val { font-family: 'Righteous', cursive; font-size: 1.5rem; line-height: 1.15; }
  .score-box.c .val { color: var(--green); }
  .score-box.w .val { color: var(--red); }
  .score-box.t .val { color: var(--indigo-l); }

  .game-card {
    background: var(--surface); border-radius: var(--radius); padding: 22px 20px;
    width: 100%; max-width: 580px; border: 1px solid var(--surface2);
    box-shadow: 0 0 40px rgba(99,102,241,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }

  .prompt {
    font-family: 'Righteous', cursive;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    color: var(--text); text-align: center; line-height: 1.5;
  }

  /* ── Compare mode ── */
  .numbers-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    justify-content: center; align-items: center;
  }
  .num-bubble {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: var(--surface2);
    border: 2px solid var(--surface2); color: var(--text);
    animation: bubbleIn 0.25s ease both;
  }
  @keyframes bubbleIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .sym-btn {
    font-family: 'Righteous', cursive; font-size: 1.6rem;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px; background: var(--surface2);
    border: 2px solid var(--surface2); color: var(--text);
    cursor: pointer; transition: all 0.16s;
    -webkit-tap-highlight-color: transparent;
  }
  .sym-btn:hover, .sym-btn:active { border-color: var(--indigo-l); background: rgba(99,102,241,0.15); }
  .sym-btn.selected    { border-color: var(--indigo-l); background: rgba(99,102,241,0.2); color: var(--indigo-l); }
  .sym-btn.correct-sym { border-color: var(--green);    background: rgba(34,197,94,0.15); color: var(--green); }
  .sym-btn.wrong-sym   { border-color: var(--red);      background: rgba(239,68,68,0.15); color: var(--red); }

  /* ── Order mode ── */
  .order-section { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

  .tap-hint {
    font-size: 0.75rem; color: var(--muted); font-weight: 600;
    text-align: center; line-height: 1.5;
  }

  /* Pool of tappable bubbles */
  .pool-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; min-height: 72px; align-items: center;
  }
  .pool-bubble {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    width: 68px; height: 68px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: var(--surface2);
    border: 2.5px solid var(--indigo); color: var(--text);
    cursor: pointer; transition: all 0.18s;
    animation: bubbleIn 0.2s ease both;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .pool-bubble:hover, .pool-bubble:active { background: rgba(99,102,241,0.2); transform: scale(1.08); }
  .pool-bubble.selected-bubble {
    background: var(--indigo); color: white; border-color: var(--indigo-l);
    transform: scale(1.12);
    box-shadow: 0 0 0 4px rgba(99,102,241,0.35);
  }
  .pool-bubble.placed { opacity: 0; pointer-events: none; transform: scale(0.4); }

  /* Slots */
  .slots-section { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
  .slots-label {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted);
  }
  .slots-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    justify-content: center; align-items: center;
  }
  .slot-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .slot-ordinal {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
  }
  .slot {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    width: 68px; height: 68px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 2.5px dashed var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .slot.ready {
    border-color: var(--pink); border-style: solid;
    background: rgba(236,72,153,0.08);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0   rgba(236,72,153,0.5); }
    50%       { box-shadow: 0 0 0 7px rgba(236,72,153,0);   }
  }
  .slot.filled {
    background: rgba(99,102,241,0.15);
    border-color: var(--indigo); border-style: solid; color: var(--indigo-l);
  }
  .slot.filled:hover, .slot.filled:active {
    background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red);
  }

  /* ── Check btn ── */
  .check-btn {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.95rem;
    padding: 10px 28px; background: var(--indigo); color: white;
    border: none; border-radius: 12px; cursor: pointer;
    transition: all 0.16s; box-shadow: 0 4px 0 #4338ca;
    -webkit-tap-highlight-color: transparent;
  }
  .check-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #4338ca; }
  .check-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #4338ca; }
  .check-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

  .feedback {
    width: 100%; border-radius: 12px; padding: 11px 14px;
    font-size: 0.9rem; font-weight: 700; text-align: center;
    display: none; animation: slideDown 0.18s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.ok  { background: rgba(34,197,94,0.12);  color: #4ade80; display: block; border: 1px solid rgba(34,197,94,0.3); }
  .feedback.err { background: rgba(239,68,68,0.12);  color: #fca5a5; display: block; border: 1px solid rgba(239,68,68,0.3); }

  .next-btn {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.95rem;
    padding: 10px 30px; background: var(--green); color: white;
    border: none; border-radius: 12px; cursor: pointer;
    transition: all 0.16s; box-shadow: 0 4px 0 var(--green-dk); display: none;
    -webkit-tap-highlight-color: transparent;
  }
  .next-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--green-dk); }
  .next-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--green-dk); }
  .next-btn.show { display: block; }

  .progress-wrap { width: 100%; max-width: 580px; margin-top: 6px; }
  .prog-track { background: var(--surface); border-radius: 99px; height: 8px; overflow: hidden; }
  .prog-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--indigo), var(--pink));
    transition: width 0.35s ease; width: 0%;
  }
  .prog-label { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 3px; font-weight: 700; }

  .reset-btn {
    margin-top: 8px; font-family: 'DM Sans', sans-serif; font-weight: 700;
    font-size: 0.76rem; color: var(--muted); background: none;
    border: 1px solid var(--surface2); padding: 5px 14px;
    border-radius: 50px; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }

  #confetti-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <h1>⚖️ Compare &amp; Order</h1>
  <p>Primary 1 · Numbers within 100</p>
</header>

<div class="controls">
  <button class="level-btn easy active" onclick="setLevel('easy')">⭐ Easy</button>
  <button class="level-btn medium"      onclick="setLevel('medium')">🔥 Medium</button>
  <button class="level-btn hard"        onclick="setLevel('hard')">💎 Hard</button>
</div>

<div class="scoreboard">
  <div class="score-box c"><div class="lbl">Correct</div><div class="val" id="sc-c">0</div></div>
  <div class="score-box w"><div class="lbl">Wrong</div>  <div class="val" id="sc-w">0</div></div>
  <div class="score-box t"><div class="lbl">Total</div>  <div class="val" id="sc-t">0</div></div>
</div>

<div class="game-card">
  <div class="prompt" id="prompt"></div>
  <div id="game-body"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Next ➜</button>
</div>

<div class="progress-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-label" id="prog-label">0 / 10 questions</div>
</div>
<button class="reset-btn" onclick="resetGame()">↺ Reset Score</button>
<a href="index.html" style="margin-top:4px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.76rem;color:#6b7280;background:none;border:2px solid #e5e7eb;padding:5px 14px;border-radius:50px;text-decoration:none;display:inline-block;">🏠 Home</a>

<script>
let level = 'easy';
let sc = 0, sw = 0, st = 0, qCount = 0;
const TOTAL = 10;
let answered = false;
let qType, nums, correctOrder, correctSym, selectedSym = null;
let filledSlots = [], selectedNum = null;

const rand   = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

function setLevel(l) {
  level = l;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.level-btn.' + l).classList.add('active');
  resetGame();
}

// ── Generate ──────────────────────────────────────────
function generateQ() {
  answered = false; selectedSym = null; selectedNum = null; filledSlots = [];

  if (level === 'easy') {
    qType = 'compare';
    const a = rand(1, 99);
    let b = Math.random() < 0.15 ? a : (() => { let v; do { v = rand(1,99); } while (v===a); return v; })();
    nums = [a, b];
    correctSym = a < b ? '<' : a > b ? '>' : '=';
    renderCompare(a, b);

  } else if (level === 'medium') {
    qType = 'order_asc';
    let pool;
    do { pool = [rand(1,33), rand(34,66), rand(67,99)]; } while (new Set(pool).size < 3);
    nums = shuffle(pool);
    correctOrder = [...nums].sort((a, b) => a - b);
    renderOrder(nums, 'smallest → largest', 3);

  } else {
    qType = 'order_desc';
    nums = [];
    while (nums.length < 4) { const n = rand(1,99); if (!nums.includes(n)) nums.push(n); }
    nums = shuffle(nums);
    correctOrder = [...nums].sort((a, b) => b - a);
    renderOrder(nums, 'largest → smallest', 4);
  }

  clearFeedback();
  document.getElementById('next-btn').classList.remove('show');
}

// ── COMPARE ───────────────────────────────────────────
function renderCompare(a, b) {
  document.getElementById('prompt').textContent = 'Choose the correct symbol to compare the two numbers.';
  document.getElementById('game-body').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;">' +
      '<div class="numbers-row">' +
        '<div class="num-bubble" style="border-color:var(--indigo);">' + a + '</div>' +
        '<div id="sym-display" style="font-family:\'Righteous\',cursive;font-size:2rem;color:var(--muted);width:48px;text-align:center;">?</div>' +
        '<div class="num-bubble" style="border-color:var(--pink);">'  + b + '</div>' +
      '</div>' +
      '<div style="display:flex;gap:10px;justify-content:center;">' +
        '<button class="sym-btn" id="sym-lt" onclick="selectSym(\'<\')">&lt;</button>' +
        '<button class="sym-btn" id="sym-eq" onclick="selectSym(\'=\')">=</button>' +
        '<button class="sym-btn" id="sym-gt" onclick="selectSym(\'>\')">&gt;</button>' +
      '</div>' +
      '<button class="check-btn" id="check-btn" onclick="checkAnswer()">Check!</button>' +
    '</div>';
}

function selectSym(sym) {
  if (answered) return;
  selectedSym = sym;
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('selected'));
  const map = { '<':'sym-lt', '=':'sym-eq', '>':'sym-gt' };
  document.getElementById(map[sym]).classList.add('selected');
  document.getElementById('sym-display').textContent = sym;
  document.getElementById('sym-display').style.color = 'var(--indigo-l)';
}

// ── ORDER ─────────────────────────────────────────────
function renderOrder(numbers, dirLabel, count) {
  document.getElementById('prompt').innerHTML =
    'Tap a number to select it, then tap a box to place it.<br>' +
    'Order: <b style="color:var(--indigo-l)">' + dirLabel + '</b>';

  filledSlots = new Array(count).fill(null);

  let poolHtml = '<div class="pool-row" id="pool-row">';
  numbers.forEach(n => {
    poolHtml += '<div class="pool-bubble" id="pb-' + n + '" onclick="tapBubble(' + n + ')">' + n + '</div>';
  });
  poolHtml += '</div>';

  const ordinals = ['1st','2nd','3rd','4th'];
  let slotsHtml = '<div class="slots-section"><div class="slots-label">' + dirLabel + '</div><div class="slots-row">';
  for (let i = 0; i < count; i++) {
    slotsHtml +=
      '<div class="slot-wrap">' +
        '<div class="slot-ordinal">' + ordinals[i] + '</div>' +
        '<div class="slot" id="slot-' + i + '" onclick="tapSlot(' + i + ')">?</div>' +
      '</div>';
    if (i < count - 1) slotsHtml += '<div style="color:var(--muted);font-size:1.1rem;padding-bottom:22px;align-self:center;">→</div>';
  }
  slotsHtml += '</div></div>';

  document.getElementById('game-body').innerHTML =
    '<div class="order-section">' +
      '<div class="tap-hint">Tap a number to select it (it glows), then tap a box to place it.<br>Tap a filled box to return the number.</div>' +
      poolHtml + slotsHtml +
      '<button class="check-btn" id="check-btn" onclick="checkAnswer()">Check!</button>' +
    '</div>';
}

// ── TAP BUBBLE ────────────────────────────────────────
function tapBubble(n) {
  if (answered) return;
  if (selectedNum === n) {
    selectedNum = null;
    document.getElementById('pb-' + n).classList.remove('selected-bubble');
    clearSlotHighlights(); return;
  }
  if (selectedNum !== null) {
    const prev = document.getElementById('pb-' + selectedNum);
    if (prev) prev.classList.remove('selected-bubble');
  }
  selectedNum = n;
  document.getElementById('pb-' + n).classList.add('selected-bubble');
  clearSlotHighlights();
  filledSlots.forEach((v, i) => { if (v === null) document.getElementById('slot-' + i).classList.add('ready'); });
}

// ── TAP SLOT ─────────────────────────────────────────
function tapSlot(idx) {
  if (answered) return;

  // Tap filled slot → return number to pool
  if (filledSlots[idx] !== null) {
    const ret = filledSlots[idx];
    filledSlots[idx] = null;
    const slot = document.getElementById('slot-' + idx);
    slot.className = 'slot'; slot.textContent = '?';
    const pb = document.getElementById('pb-' + ret);
    if (pb) {
      pb.classList.remove('placed');
      if (selectedNum === ret) { selectedNum = null; pb.classList.remove('selected-bubble'); }
    }
    clearSlotHighlights(); return;
  }

  // Tap empty slot with selected bubble → place it
  if (selectedNum === null) return;
  filledSlots[idx] = selectedNum;
  const slot = document.getElementById('slot-' + idx);
  slot.className = 'slot filled'; slot.textContent = selectedNum;
  const pb = document.getElementById('pb-' + selectedNum);
  if (pb) pb.classList.add('placed');
  selectedNum = null;
  clearSlotHighlights();
}

function clearSlotHighlights() {
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('ready'));
}

// ── CHECK ─────────────────────────────────────────────
function checkAnswer() {
  if (answered) return;

  if (qType === 'compare') {
    if (selectedSym === null) { showFeedback('err', '⚠️ Please select a symbol first!'); return; }
    answered = true; st++; qCount++;
    document.getElementById('check-btn').disabled = true;
    const correct = selectedSym === correctSym;
    const map = { '<':'sym-lt', '=':'sym-eq', '>':'sym-gt' };
    if (correct) { sc++; document.getElementById(map[selectedSym]).classList.add('correct-sym'); launchConfetti(); }
    else {
      sw++;
      document.getElementById(map[selectedSym]).classList.add('wrong-sym');
      document.getElementById(map[correctSym]).classList.add('correct-sym');
    }
    showFeedback(correct ? 'ok' : 'err',
      correct ? '🎉 Correct! ' + nums[0] + ' ' + correctSym + ' ' + nums[1]
              : '❌ The correct answer is: ' + nums[0] + ' ' + correctSym + ' ' + nums[1]);

  } else {
    if (!filledSlots.every(v => v !== null)) { showFeedback('err', '⚠️ Please fill all boxes first!'); return; }
    answered = true; st++; qCount++;
    document.getElementById('check-btn').disabled = true;
    clearSlotHighlights();
    const correct = filledSlots.every((v, i) => v === correctOrder[i]);
    if (correct) { sc++; launchConfetti(); } else { sw++; }
    showFeedback(correct ? 'ok' : 'err',
      correct ? '🎉 Correct! ' + correctOrder.join(' → ')
              : '❌ The correct order is: ' + correctOrder.join(' → '));
  }

  updateScore(); updateProgress();
  if (qCount < TOTAL) document.getElementById('next-btn').classList.add('show');
  else showEndScreen();
}

function nextQ() { generateQ(); }

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + type; fb.textContent = msg;
}
function clearFeedback() {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
}
function updateScore() {
  document.getElementById('sc-c').textContent = sc;
  document.getElementById('sc-w').textContent = sw;
  document.getElementById('sc-t').textContent = st;
}
function updateProgress() {
  document.getElementById('prog-fill').style.width = (qCount / TOTAL * 100) + '%';
  document.getElementById('prog-label').textContent = qCount + ' / ' + TOTAL + ' questions';
}

function showEndScreen() {
  const pct = Math.round((sc / TOTAL) * 100);
  let msg, em;
  if (pct === 100)    { msg = "Perfect! You're a number champion!"; em = '🏆'; }
  else if (pct >= 70) { msg = "Great comparing skills!"; em = '🌟'; }
  else                { msg = "Good try! Keep practising!"; em = '💪'; }
  document.getElementById('game-body').innerHTML =
    '<div style="text-align:center;padding:16px 0;">' +
    '<div style="font-size:2.8rem;">' + em + '</div>' +
    '<div style="font-family:\'Righteous\',cursive;font-size:1.25rem;color:var(--text);margin-top:8px;">' + msg + '</div>' +
    '<div style="font-size:0.9rem;color:var(--muted);margin-top:5px;">Score: ' + sc + ' / ' + TOTAL + ' (' + pct + '%)</div>' +
    '<button onclick="resetGame()" style="margin-top:14px;font-family:\'DM Sans\',sans-serif;font-weight:700;font-size:0.9rem;padding:9px 26px;background:var(--indigo);color:white;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 0 #4338ca;">Play Again!</button>' +
    '</div>';
  document.getElementById('next-btn').classList.remove('show');
  clearFeedback();
  if (pct === 100) launchConfetti(180);
}

function resetGame() {
  sc = sw = st = qCount = 0; selectedNum = null; selectedSym = null; filledSlots = [];
  updateScore(); updateProgress(); generateQ();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (!answered) checkAnswer();
    else if (document.getElementById('next-btn').classList.contains('show')) nextQ();
  }
});

function launchConfetti(count) {
  count = count || 55;
  const cv = document.getElementById('confetti-canvas');
  const ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const cols = ['#6366f1','#ec4899','#22c55e','#facc15','#38bdf8','#f97316'];
  const ps = Array.from({length: count}, () => ({
    x: Math.random()*cv.width, y: -10, r: Math.random()*5+3,
    color: cols[Math.floor(Math.random()*cols.length)],
    ta: 0, tai: Math.random()*0.07+0.04,
    vx: Math.random()*2-1, vy: Math.random()*3+2
  }));
  let ttl = 110;
  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p => {
      p.ta+=p.tai; p.y+=p.vy; p.x+=p.vx;
      ctx.beginPath(); ctx.lineWidth=p.r/2; ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+Math.sin(p.ta)*12+p.r/4,p.y);
      ctx.lineTo(p.x+Math.sin(p.ta)*12,p.y+p.r/4);
      ctx.stroke();
    });
    ttl--;
    if (ttl>0) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}

generateQ();
</script>
